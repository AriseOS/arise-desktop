# Ami Cloud Backend Configuration
# Server-side AI analysis and data storage

# App Version Control
app:
  minimum_version: "0.0.5"  # Minimum required client app version (force upgrade if below)

# Server Configuration
server:
  host: 127.0.0.1  # Only listen on localhost (Caddy will handle external access)
  port: 9000
  debug: false
  reload: false  # Set to true for development

# Storage Configuration
# IMPORTANT: Cloud Backend uses ~/ami-server (server-side data)
# App Backend uses ~/.ami (local client data)
storage:
  type: filesystem  # Options: filesystem, s3
  base_path: ~/ami-server  # Base path for server-side file storage

  # S3 Configuration (uncomment to use)
  # s3_bucket: ami-cloud-storage
  # s3_region: us-east-1
  # s3_access_key_env: AWS_ACCESS_KEY_ID
  # s3_secret_key_env: AWS_SECRET_ACCESS_KEY

# Database Configuration
database:
  type: sqlite  # Options: sqlite, postgresql

  # SQLite Configuration (default)
  sqlite:
    path: ~/ami-server/database/ami.db

  # PostgreSQL Configuration (uncomment to use)
  # postgresql:
  #   host: localhost
  #   port: 5432
  #   database: ami
  #   user: ami_user
  #   password_env: DB_PASSWORD

# LLM Configuration
# All LLM calls go through Claude Relay Service (CRS)
llm:
  default_provider: anthropic  # Options: anthropic, openai

  # CRS (Claude Relay Service) Configuration
  # All LLM calls route through CRS
  # Migration: Upgraded old API Proxy to CRS (port remains 8080)
  use_proxy: true  # Always use CRS for LLM calls
  proxy_url: "https://api.ariseos.com/api"  # CRS port (custom configuration)
  # For production, change to: https://crs.ariseos.com

# Tavily Configuration
# Web search and research via CRS Tavily endpoints
tavily:
  api_url: "https://api.ariseos.com/tavily"  # CRS Tavily API base URL

  # Anthropic Configuration
  # Note: API keys are provided by users through CRS (Claude Relay Service)
  # System API key (ANTHROPIC_API_KEY env var) is no longer used
  anthropic:
    model: claude-sonnet-4-5-20250929
    max_tokens: 4096
    temperature: 0.0

  # OpenAI Configuration
  # Note: API keys are provided by users through CRS (Claude Relay Service)
  # System API key (OPENAI_API_KEY env var) is no longer used
  openai:
    model: gpt-4
    max_tokens: 4096
    temperature: 0.0

# Workflow Generation Configuration
workflow_generation:
  save_intermediates: true  # Save intent_graph.json and metaflow.yaml
  timeout_seconds: 300  # 5 minutes timeout
  max_retries: 3
  retry_delay_seconds: 5

# Session Management Configuration
# Intent Builder session cleanup settings
session:
  timeout_minutes: 30  # Session inactivity timeout (30 minutes)
  cleanup_interval_minutes: 5  # Background cleanup task runs every 5 minutes

# Authentication Configuration
auth:
  secret_key_env: JWT_SECRET_KEY  # Set this environment variable
  algorithm: HS256
  access_token_expire_minutes: 60  # 1 hour
  refresh_token_expire_days: 30

# Logging Configuration
logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  json_format: true  # JSON format for Loki/Promtail integration
  file: ~/ami-server/logs/cloud-backend.log  # Log file path (also used by Promtail)
  max_bytes: 104857600  # 100MB per file
  backup_count: 5  # Keep 5 backup files

# CORS Configuration
cors:
  allow_origins:
    - http://localhost:3000
    - http://localhost:8000
  allow_credentials: true
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
  allow_headers:
    - "*"

# Rate Limiting (optional)
# rate_limit:
#   enabled: true
#   requests_per_minute: 60
#   burst: 10

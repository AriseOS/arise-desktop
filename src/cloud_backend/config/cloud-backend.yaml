# Ami Cloud Backend Configuration
# Server-side AI analysis and data storage

# App Version Control
app:
  minimum_version: "0.0.4"  # Minimum required client app version (force upgrade if below)

# Server Configuration
server:
  host: 127.0.0.1  # Only listen on localhost (Caddy will handle external access)
  port: 9000
  debug: false
  reload: false  # Set to true for development

# Storage Configuration
# IMPORTANT: Cloud Backend uses ~/ami-server (server-side data)
# App Backend uses ~/.ami (local client data)
storage:
  type: filesystem  # Options: filesystem, s3
  base_path: ~/ami-server  # Base path for server-side file storage

  # S3 Configuration (uncomment to use)
  # s3_bucket: ami-cloud-storage
  # s3_region: us-east-1
  # s3_access_key_env: AWS_ACCESS_KEY_ID
  # s3_secret_key_env: AWS_SECRET_ACCESS_KEY

# Database Configuration
database:
  type: sqlite  # Options: sqlite, postgresql

  # SQLite Configuration (default)
  sqlite:
    path: ~/ami-server/database/ami.db

  # PostgreSQL Configuration (uncomment to use)
  # postgresql:
  #   host: localhost
  #   port: 5432
  #   database: ami
  #   user: ami_user
  #   password_env: DB_PASSWORD

# LLM Configuration
# All LLM calls go through Claude Relay Service (CRS)
llm:
  default_provider: anthropic  # Options: anthropic, openai

  # CRS (Claude Relay Service) Configuration
  # All LLM calls route through CRS
  # Migration: Upgraded old API Proxy to CRS (port remains 8080)
  use_proxy: true  # Always use CRS for LLM calls
  proxy_url: "https://api.ariseos.com/api"  # CRS port (custom configuration)
  # For production, change to: https://crs.ariseos.com

  # Anthropic Configuration
  # Note: API keys are provided by users through CRS (Claude Relay Service)
  # System API key (ANTHROPIC_API_KEY env var) is no longer used
  anthropic:
    # model: claude-sonnet-4-5-20250929  # Default model for complex tasks
    # simple_model: claude-haiku-4-5-20251001  # Light model for description generation (optional, falls back to default)
    model: glm-4.7  # Default model for complex tasks
    simple_model: glm-4.5-air # Light model for description generation (optional, falls back to default)
    max_tokens: 4096
    temperature: 0.0

  # OpenAI Configuration
  # Note: API keys are provided by users through CRS (Claude Relay Service)
  # System API key (OPENAI_API_KEY env var) is no longer used
  openai:
    model: gpt-4
    max_tokens: 4096
    temperature: 0.0

# Tavily Configuration
# Web search and research via CRS Tavily endpoints
tavily:
  api_url: "https://api.ariseos.com/tavily"  # CRS Tavily API base URL

# Workflow Generation Configuration
workflow_generation:
  save_intermediates: true  # Save intent_graph.json and metaflow.yaml
  timeout_seconds: 300  # 5 minutes timeout
  max_retries: 3
  retry_delay_seconds: 5

# Session Management Configuration
# Intent Builder session cleanup settings
session:
  timeout_minutes: 30  # Session inactivity timeout (30 minutes)
  cleanup_interval_minutes: 5  # Background cleanup task runs every 5 minutes

# Authentication Configuration
auth:
  secret_key_env: JWT_SECRET_KEY  # Set this environment variable
  algorithm: HS256
  access_token_expire_minutes: 60  # 1 hour
  refresh_token_expire_days: 30

# Logging Configuration
logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  json_format: true  # JSON format for Loki/Promtail integration
  file: ~/ami-server/logs/cloud-backend.log  # Log file path (also used by Promtail)
  max_bytes: 104857600  # 100MB per file
  backup_count: 5  # Keep 5 backup files

# CORS Configuration
cors:
  allow_origins:
    - http://localhost:3000
    - http://localhost:8000
  allow_credentials: true
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
  allow_headers:
    - "*"

# Graph Store Configuration
# Backend for Memory graph storage
#
# Available backends:
#   - networkx: In-memory (development, data lost on restart)
#   - neo4j: Persistent graph database (production option 1)
#   - surrealdb: Multi-model database (production option 2)
#
# Neo4j setup:
#   docker run -d --name neo4j -p 7474:7474 -p 7687:7687 \
#     -e NEO4J_AUTH=neo4j/your_password neo4j:5.15
#
# SurrealDB setup:
#   docker run -d --name surrealdb -p 8000:8000 \
#     surrealdb/surrealdb:latest start --user root --pass your_password
#
graph_store:
  backend: neo4j  # Options: networkx, neo4j, surrealdb

  # Neo4j Configuration (used when backend: neo4j)
  uri: neo4j://localhost:7687    # Or use NEO4J_URI env var
  user: neo4j                     # Or use NEO4J_USER env var
  # password: your_password       # Or use NEO4J_PASSWORD env var
  database: neo4j                 # Or use NEO4J_DATABASE env var

  # SurrealDB Configuration (used when backend: surrealdb)
  # url: ws://localhost:8000/rpc  # Or use SURREALDB_URL env var
  # namespace: ami                # Or use SURREALDB_NAMESPACE env var
  # database: memory              # Or use SURREALDB_DATABASE env var
  # username: root                # Or use SURREALDB_USER env var
  # password: your_password       # Or use SURREALDB_PASSWORD env var
  # vector_dimensions: 1024

# Embedding Model Configuration
# For semantic search in Memory system
embedding:
  provider: openai  # Options: openai, local_bge (openai works with OpenAI-compatible APIs)
  model: BAAI/bge-m3  # Model name (supports Chinese/English, 8K tokens)
  dimension: 1024  # Embedding vector dimension
  # API configuration (for OpenAI-compatible APIs like SiliconFlow)
  api_url: https://api.siliconflow.cn/v1  # SiliconFlow API base URL
  api_key: sk-nfveshrtleyiscbeivhxltvvlvbzelohzdwqgkozttaslmdu # Environment variable for API key

# Reasoner Configuration
# Memory retrieval and workflow planning
reasoner:
  max_depth: 3  # Maximum BFS traversal depth for path finding
  # Similarity thresholds for embedding search
  similarity_thresholds:
    state_resolution: 0.5  # Minimum score to accept a state match when resolving state by URL/description
    path_finding: 0.3  # Minimum score for candidate states in navigation path finding

# Memory Configuration
# IntentSequence and workflow storage settings
memory:
  # IntentSequence deduplication threshold
  # Sequences with cosine similarity >= this threshold are considered duplicates
  # Higher value = stricter dedup (only near-identical sequences are merged)
  # Lower value = more aggressive dedup (semantically similar sequences are merged)
  intent_sequence_dedup_threshold: 0.95

# Rate Limiting (optional)
# rate_limit:
#   enabled: true
#   requests_per_minute: 60
#   burst: 10

# Ami Cloud Backend Configuration
# Memory-as-a-Service + Auth

# App Version Control
app:
  minimum_version: "0.6.0"  # Minimum required client app version (force upgrade if below)

# Server Configuration
server:
  host: 127.0.0.1  # Only listen on localhost (Caddy will handle external access)
  port: 9090
  debug: false
  reload: false  # Set to true for development

# Storage Configuration
# IMPORTANT: Cloud Backend uses ~/ami-server (server-side data)
# App Backend uses ~/.ami (local client data)
storage:
  type: filesystem  # Options: filesystem, s3
  base_path: ~/ami-server  # Base path for server-side file storage

# Database Configuration
# User data is stored in sub2api's PostgreSQL (no local users table).
# This section configures SurrealDB for memory storage — see graph_store below.
# Legacy SQLite config has been removed.

# LLM Configuration
# Per-user API keys are managed by sub2api. These settings configure model and proxy routing.
llm:
  default_provider: anthropic  # Options: anthropic, openai

  # Proxy/relay URL (required) - sub2api gateway base URL (no path suffix)
  # Change per environment:
  #   Development: http://localhost:8080
  #   Production: https://api.yourdomain.com (or internal sub2api address)
  proxy_url: "http://localhost:8080"

  # Anthropic Configuration
  anthropic:
    model: claude-sonnet-4-5-20250929  # Default model for complex tasks
    simple_model: claude-haiku-4-5-20251001  # Light model for description generation
    max_tokens: 16384
    temperature: 0.0

  # OpenAI Configuration
  openai:
    model: gpt-4
    max_tokens: 16384
    temperature: 0.0

# Authentication Configuration
auth:
  secret_key_env: JWT_SECRET_KEY  # Environment variable (required, read directly by auth.py)
  algorithm: HS256
  access_token_expire_minutes: 60  # 1 hour
  refresh_token_expire_days: 30

# Email / Verification / Password Reset
# These features are proxied to sub2api which handles email sending, verification codes,
# and password reset tokens. Configure email settings in sub2api, not here.
# Only the frontend base URL is needed for password reset email links.
email:
  base_url: "https://app.ariseos.com"  # Frontend URL (used in sub2api password reset emails)

# Rate Limiting Configuration
rate_limit:
  enabled: true
  storage: memory  # Options: memory, redis (memory = in-process, redis for multi-worker)
  # redis_url: redis://localhost:6379/0  # Required when storage: redis
  # Per-endpoint limits (format: "count/period" where period is second/minute/hour/day)
  auth_login: "5/minute"
  auth_register: "3/minute"
  auth_password_reset: "3/minute"
  api_default: "60/minute"
  public_default: "30/minute"

# Logging Configuration
logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  json_format: true  # JSON format for Loki/Promtail integration
  file: ~/ami-server/logs/cloud-backend.log  # Log file path (also used by Promtail)
  max_bytes: 104857600  # 100MB per file
  backup_count: 5  # Keep 5 backup files

# CORS Configuration
cors:
  allow_origins:
    - http://localhost:3000
    - http://localhost:5173
    - http://localhost:8000
    - https://ariseos.com
    - https://www.ariseos.com
  allow_credentials: true
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
  allow_headers:
    - Authorization
    - Content-Type
    - X-Request-ID

# Graph Store Configuration
# Backend for Memory graph storage
#
# Available backends:
#   - networkx: In-memory (development, data lost on restart)
#   - surrealdb: Multi-model database (production)
#
# SurrealDB setup:
#   docker run -d --name surrealdb -p 8000:8000 \
#     surrealdb/surrealdb:latest start --allow-experimental record_references --user root --pass your_password
#
graph_store:
  backend: surrealdb  # Options: networkx, surrealdb

  # SurrealDB Configuration (used when backend: surrealdb)
  url: ws://localhost:8000/rpc  # Or use SURREALDB_URL env var
  namespace: ami                # Or use SURREALDB_NAMESPACE env var
  database: memory              # Or use SURREALDB_DATABASE env var
  username: root                # Or use SURREALDB_USER env var
  password: root                # Or use SURREALDB_PASSWORD env var
  vector_dimensions: 1024

# Sub2API (CRS) Configuration
# Per-user token tracking via sub2api Admin API
sub2api:
  admin_api_key_env: SUB2API_ADMIN_API_KEY  # Environment variable for admin API key

# Embedding Model Configuration
# Server-side API key (not per-user) — embedding providers don't go through sub2api.
embedding:
  provider: openai  # Options: openai, local_bge (openai works with OpenAI-compatible APIs)
  model: BAAI/bge-m3  # Model name (supports Chinese/English, 8K tokens)
  dimension: 1024  # Embedding vector dimension
  base_url: https://api.siliconflow.cn/v1  # OpenAI-compatible endpoint (direct to provider)
  api_key_env: EMBEDDING_API_KEY  # Environment variable for embedding API key

# Rerank Model Configuration
# Server-side API key (not per-user) — rerank providers don't go through sub2api.
rerank:
  provider: maas  # Options: maas, local_bge
  model: BAAI/bge-reranker-v2-m3  # Rerank model name
  base_url: https://api.siliconflow.cn/v1  # OpenAI-compatible endpoint (same convention as embedding)
  api_key_env: RERANK_API_KEY  # Environment variable for rerank API key

# Reasoner Configuration
# Memory retrieval and workflow planning
reasoner:
  max_depth: 3
  similarity_thresholds:
    state_resolution: 0.5
    path_finding: 0.3
  path_planning:
    candidate_top_k: 20
    min_score: 0.15
    max_states: 20
    max_actions: 50
    domain_prefilter_enabled: true
    domain_match_threshold: 0.45
    domain_min_candidates: 3
    domain_fallback_to_full_graph: true

# Memory Configuration
# IntentSequence and workflow storage settings
memory:
  intent_sequence_dedup_threshold: 0.95

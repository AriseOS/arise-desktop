metadata:
  created_at: '2025-07-22T10:11:18.399323'
  description: AgentBuilder自动生成的工作流，包含3个步骤
  name: agentbuilder_workflow_build_c0
  version: 1.0.0
steps:
- agent_type: tool_agent
  description: 使用browser_use工具自动导航到用户的Wiki页面，提取当天的活动数据。输入为Wiki URL，输出为活动数据的文本格式。
  instruction: 导航到提供的Wiki URL并提取当天的活动数据。
  name: 收集Wiki活动数据
- agent_type: text_agent
  description: 利用llm_extract工具对收集到的活动数据进行摘要和重组，生成格式化的工作报告。
  instruction: 使用llm_extract工具对输入的活动数据进行处理，生成格式化的工作报告。
  name: 生成工作报告
- agent_type: tool_agent
  description: 通过调用微信API或使用browser_use工具模拟网页操作，将生成的报告发送给指定的领导。输入为报告文本，输出为发送成功的确认。
  instruction: 使用browser_use工具将报告发送至指定的微信领导。
  name: 发送报告至微信

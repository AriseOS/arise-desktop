agent:
  llm:
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-5
    provider: anthropic

  # Claude Agent SDK configuration (for multi-turn iterative tasks)
  claude_agent:
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-5
    default_max_iterations: 50
    default_tools:
      - Read
      - Write
      - Edit
      - Bash
      - Glob

  memory:
    config:
      embedder:
        config:
          api_key: ${OPENAI_API_KEY}
          model: text-embedding-3-small
        provider: openai
      llm:
        config:
          api_key: ${OPENAI_API_KEY}
          model: gpt-4o-mini
        provider: openai
      vector_store:
        config:
          collection_name: mem0_collection
          path: ~/.local/share/baseapp/chroma_db
        provider: chroma
      version: v1.1
    enabled: true
    provider: mem0
  name: BaseApp Agent
  tools:
    browser:
      headless: false
      timeout: 30
    enabled:
    - browser
    - memory
app:
  debug: false
  host: 0.0.0.0
  name: BaseApp
  port: 8000
  version: 1.0.0

# Web backend configuration (merged from backend.yaml)
web:
  server:
    host: 0.0.0.0
    port: 8000
    reload: true  # Enable hot reload in development
  security:
    # IMPORTANT: Change this in production!
    secret_key: ${SECRET_KEY:-your-secret-key-here-change-in-production}
    algorithm: HS256
    access_token_expire_minutes: 30

# Data storage configuration
data:
  # Root directory for all data files
  root: ~/.local/share/baseapp

  # Database files
  databases:
    sessions: ${data.root}/sessions.db    # Session storage
    kv: ${data.root}/agent_kv.db          # Key-value storage (script cache, variables)
    storage: ${data.root}/storage.db      # Storage agent database
    users: ${data.root}/agentcrafter_users.db  # Web backend user authentication database

  # Vector database directory
  chroma_db: ${data.root}/chroma_db

  # Browser related directories
  browser_data: ~/.cache/baseapp/browser_data   # Browser user data
  debug: ${data.root}/debug                     # Debug output

  # Claude Agent SDK working directories
  scripts: ${data.root}/scripts                 # Generated scripts workspace
  # Each script generation creates a subdirectory under scripts/
  # Example: scripts/scraper_script_abc123/
  #   - requirement.json       # Data requirements
  #   - dom_data.json         # DOM data
  #   - extraction_script.py  # Generated script
  #   - metadata.yaml         # Script metadata

logging:
  backup_count: 5
  file: ${data.root}/logs/baseapp.log
  level: INFO
  max_size: 10MB

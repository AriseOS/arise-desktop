# Foreach Loop Test Workflow
apiVersion: "ami.io/v1"
kind: "Workflow"

metadata:
  name: "foreach-test-workflow"
  description: "Test workflow to verify foreach loop functionality"
  version: "1.0.0"
  author: "Ami"
  tags: ["test", "foreach", "control-flow"]

# Workflow inputs
inputs:
  test_mode:
    type: "string"
    description: "Test mode: simple or nested"
    required: false
    default: "simple"

# Workflow outputs
outputs:
  processed_items:
    type: "array"
    description: "List of processed items"
  summary:
    type: "string"
    description: "Test summary"

# Global config
config:
  max_execution_time: 300
  enable_parallel: false
  enable_cache: false

# Workflow steps
steps:
  # Step 1: Initialize test data
  - id: "init-test-data"
    name: "Initialize Test Data"
    agent_type: "variable"
    description: "Create test data for foreach loop"

    agent_instruction: "Initialize test data"

    inputs:
      operation: "set"
      data:
        test_items:
          - name: "Item A"
            value: 100
            category: "electronics"
          - name: "Item B"
            value: 200
            category: "books"
          - name: "Item C"
            value: 150
            category: "electronics"
          - name: "Item D"
            value: 50
            category: "toys"
          - name: "Item E"
            value: 300
            category: "books"
        processed_items: []

    outputs:
      test_items: "test_items"
      processed_items: "processed_items"

    timeout: 10

  # Step 2: Process items using foreach
  - id: "process-items-loop"
    name: "Process Items with Foreach"
    agent_type: "foreach"
    description: "Iterate through test items and process each one"

    source: "{{test_items}}"
    item_var: "current_item"
    index_var: "item_index"
    max_iterations: 10
    loop_timeout: 180

    steps:
      # 2.1: Create processed record
      - id: "create-record"
        name: "Create Processed Record"
        agent_type: "variable"
        description: "Create a processed record with item data"

        agent_instruction: "Create processed item record"

        inputs:
          operation: "set"
          data:
            processed_record:
              index: "{{item_index}}"
              original_name: "{{current_item.name}}"
              original_value: "{{current_item.value}}"
              category: "{{current_item.category}}"
              processed_name: "Processed: {{current_item.name}}"
              doubled_value: 0  # Will be calculated
              status: "processed"

        outputs:
          processed_record: "processed_record"

        timeout: 10

      # 2.2: Append to results list
      - id: "save-processed-item"
        name: "Save Processed Item"
        agent_type: "variable"
        description: "Add processed item to results"

        agent_instruction: "Append processed item to list"

        inputs:
          operation: "append"
          source: "{{processed_items}}"
          data: "{{processed_record}}"

        outputs:
          result: "processed_items"

        timeout: 10

  # Step 3: Generate summary
  - id: "generate-summary"
    name: "Generate Summary"
    agent_type: "variable"
    description: "Create test result summary"

    agent_instruction: "Generate test summary"

    inputs:
      operation: "set"
      data:
        result:
          processed_items: "{{processed_items}}"
          summary: "Foreach test completed successfully"
          status: "passed"

    outputs:
      result: "final_response"

    timeout: 10
apiVersion: "ami.io/v1"
kind: "Workflow"

metadata:
  name: "allegro-order-email-workflow"
  description: "Extract order information from Allegro, copy buyer email from clipboard, and send notification email via Outlook"
  version: "2.0.0"
  tags:
    - "allegro"
    - "orders"
    - "email"
    - "automation"
    - "clipboard"

inputs: {}
  # No manual email input needed - will be captured from clipboard!

outputs:
  buyer_email:
    type: "string"
    description: "Buyer email captured from clipboard"
  order_info:
    type: "object"
    description: "Extracted order information"
  email_sent:
    type: "boolean"
    description: "Whether email was sent successfully"

config:
  max_execution_time: 300
  enable_parallel: false
  enable_cache: true

steps:
  # Step 1: Navigate to Allegro orders page
  - id: "navigate-to-orders"
    name: "Navigate to Allegro Orders"
    agent_type: "browser_agent"
    description: "Navigate to Allegro Sales Center orders page"
    inputs:
      target_url: "https://salescenter.allegro.com/orders"
    outputs:
      result: "nav_result"
    timeout: 30

  # Step 2: Extract FIRST order information from the page
  - id: "extract-first-order"
    name: "Extract First Order"
    agent_type: "scraper_agent"
    description: "Extract the first order information from the orders page"
    inputs:
      use_current_page: true
      extraction_method: "llm"
      dom_scope: "partial"
      data_requirements:
        user_description: |
          Extract ONLY the FIRST order from the Allegro orders page.
          Focus on the topmost order card.
        output_format:
          product_name: "Name of the product"
          quantity: "Quantity ordered"
          unit_price: "Price per unit"
          order_id: "Order ID number"
          dispatch_time: "Dispatch time (e.g., 1 day)"
          reference_number: "Reference number (e.g., E00024)"
          payment_status: "Payment status (PAID, PENDING, etc.)"
          total_price: "Total order price"
          order_date: "Date and time of order"
          order_status: "Current order status"
        xpath_hints:
          order_container: "//div[contains(@class, 'msts_pt') and contains(@class, 'mvrt_16')]"
          product_info: "//div[contains(@class, 'gvl9v')]"
          price_info: "//span[contains(text(), 'PLN')]"
        sample_data:
          product_name: "ZIARNO VACCARIA STYMULACJA AKUPUNKTURA USZU 600 SZT."
          quantity: "1"
          unit_price: "PLN 29.00"
          order_id: "17866974693"
          dispatch_time: "1 day"
          reference_number: "E00024"
          payment_status: "PAID"
          total_price: "PLN 39.95"
          order_date: "Dec 15, 2025, 8:26 PM"
          order_status: "DISPATCH PARCEL"
    outputs:
      extracted_data: "order_info"
    timeout: 60
  
  # Step 2.5: Click "Copy Email" button to get buyer's email (AUTO-CAPTURES TO CLIPBOARD)
  - id: "copy-buyer-email"
    name: "Copy Buyer Email from Page"
    agent_type: "browser_agent"
    description: "Click the copy email button - clipboard will be automatically captured"
    inputs:
      interaction_steps:
        - task: "Click the copy email button for the first order to copy buyer's email"
          xpath_hints:
            by_text: "//button[contains(text(), 'copy') or contains(text(), 'Copy')]"
            by_class: "//button[contains(@class, 'copy')]"
            by_aria: "//button[contains(@aria-label, 'copy') or contains(@aria-label, 'email')]"
    outputs:
      result: "copy_result"
    timeout: 20

  # Step 3: Generate email content based on order info
  - id: "generate-email-content"
    name: "Generate Email Content"
    agent_type: "text_agent"
    description: "Generate email content based on extracted order information"

    agent_instruction: |
      Based on the order information provided, generate a shipping notification email in Chinese.

      Order information: {{order_info}}
      Buyer email: {{_last_clipboard_content}}

      Email format:
      ---
      亲爱的顾客：

      感谢您在Allegro购买了[产品名称]！

      订单详情：
      - 订单编号：[order_id]
      - 商品名称：[product_name]
      - 数量：[quantity]
      - 金额：[total_price]
      - 预计发货时间：[dispatch_time]

      您的订单正在处理中，我们会尽快为您发货。如有任何问题，请随时联系我们。

      祝您购物愉快！
      Allegro卖家
      ---

      Return a JSON object with two fields:
      - email_subject: Subject line like "Allegro订单发货通知 - 订单号 [order_id]"
      - email_body: The complete email body with order details filled in

    text:
      response_style: "structured"
      max_length: 2000
      language: "zh"

    inputs:
      order_data: "{{order_info}}"
      buyer_email: "{{_last_clipboard_content}}"

    outputs:
      email_subject: "email_subject"
      email_body: "email_body"

    timeout: 30

  # Step 4: Navigate to Outlook
  - id: "navigate-to-outlook"
    name: "Navigate to Outlook"
    agent_type: "browser_agent"
    description: "Navigate to Outlook mail page"
    inputs:
      target_url: "https://outlook.live.com/mail/0/"
    outputs:
      result: "outlook_nav_result"
    timeout: 30

  # Step 5: Create new email and fill content (USING CLIPBOARD EMAIL!)
  - id: "compose-email"
    name: "Compose Email"
    agent_type: "browser_agent"
    description: "Create new email and fill in recipient (from clipboard!), subject, and body"
    inputs:
      interaction_steps:
        # Click New mail button
        - task: "Click the 'New mail' button"
          xpath_hints:
            by_aria: "//button[contains(@aria-label, 'New mail')]"
            by_text: "//span[contains(text(), 'New mail') or contains(text(), 'New message')]"
            by_id: "//*[contains(@id, 'fui-r')]"

        # Fill recipient email - USE CLIPBOARD CONTENT!
        - task: "Enter the recipient email address in the To field"
          xpath_hints:
            by_aria: "//input[contains(@aria-label, 'To')]"
            by_placeholder: "//input[contains(@placeholder, 'To')]"
          text: "{{_last_clipboard_content}}"

        # Fill subject
        - task: "Enter the email subject in the Subject field"
          xpath_hints:
            by_aria: "//input[contains(@aria-label, 'Subject')]"
            by_placeholder: "//input[contains(@placeholder, 'Subject')]"
          text: "{{email_subject}}"

        # Fill body
        - task: "Enter the email content in the body area"
          xpath_hints:
            by_role: "//div[@role='textbox']"
            by_contenteditable: "//div[@contenteditable='true']"
          text: "{{email_body}}"
    outputs:
      result: "compose_result"
    timeout: 120

  # Step 6: Send the email
  - id: "send-email"
    name: "Send Email"
    agent_type: "browser_agent"
    description: "Click send button to send the email"
    inputs:
      interaction_steps:
        - task: "Click the Send button"
          xpath_hints:
            by_aria: "//button[contains(@aria-label, 'Send')]"
            by_text: "//button[contains(text(), 'Send')]"
    outputs:
      result: "send_result"
    timeout: 30

  # Step 7: Return to Allegro and mark order as processed
  - id: "mark-order-processed"
    name: "Mark Order Processed"
    agent_type: "browser_agent"
    description: "Navigate back to Allegro and mark the order as processed"
    inputs:
      target_url: "https://salescenter.allegro.com/orders"
      interaction_steps:
        - task: "Click on the first order row to select it"
          xpath_hints:
            by_class: "//div[contains(@class, 'order-row')]"
            by_data: "//div[@data-testid='order-item']"

        - task: "Click the 'Dispatch parcel' or process button"
          xpath_hints:
            by_text: "//button[contains(text(), 'Dispatch') or contains(text(), 'Process')]"
            by_aria: "//button[contains(@aria-label, 'Dispatch')]"
    outputs:
      result: "final_response"
    timeout: 60

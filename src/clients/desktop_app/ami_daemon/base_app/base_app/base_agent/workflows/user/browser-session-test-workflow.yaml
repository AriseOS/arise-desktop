# Browser Session Sharing Test Workflow
apiVersion: "ami.io/v1"
kind: "Workflow"

metadata:
  name: "browser-session-test-workflow"
  description: "Test workflow for browser session sharing between multiple scraper agents"
  version: "1.0.0"
  author: "Ami"
  tags: ["test", "scraper", "browser-session"]

# Workflow inputs
inputs:
  test_mode:
    type: "string"
    description: "Test mode flag"
    required: false
    default: "test"

# Workflow outputs
outputs:
  example_title:
    type: "string"
    description: "Title from example.com"
  baidu_hot_topics:
    type: "array"
    description: "Hot topics from baidu.com"
  summary:
    type: "string"
    description: "Summary of both sites"

# Global configuration
config:
  max_execution_time: 300
  enable_parallel: false
  enable_cache: false

# Workflow steps
steps:
  # Step 1: Get title from example.com
  - id: "get-example-title"
    name: "Get Example.com Title"
    agent_type: "scraper_agent"
    description: "Extract title from example.com"

    agent_instruction: |
      Navigate to example.com and extract the page title.

      Use the following configuration:
      - Navigate to https://example.com
      - Extract the main heading/title text
      - Return the extracted title

    inputs:
      mode: "execute"
      extraction_method: "llm"  # Use LLM mode to avoid memory manager dependency
      target_path: "https://example.com"
      data_requirements:
        user_description: "Extract the main title/heading from the page"
        output_format:
          title: "Main page title or h1 heading"
        sample_data:
          - title: "Example Domain"
      options:
        max_items: 1
        timeout: 30

    outputs:
      extracted_data: "example_data"
      message: "example_message"

    timeout: 60

  # Step 2: Get hot topics from baidu.com
  - id: "get-baidu-hot"
    name: "Get Baidu Hot Topics"
    agent_type: "scraper_agent"
    description: "Extract hot topics from baidu.com"

    agent_instruction: |
      Navigate to baidu.com and extract hot search topics.

      Use the following configuration:
      - Navigate to https://www.baidu.com
      - Look for hot search or trending topics section
      - Extract top 5 hot topics if available
      - If no hot topics section, extract main navigation links

    inputs:
      mode: "execute"
      extraction_method: "llm"  # Use LLM mode to avoid memory manager dependency
      target_path: "https://www.baidu.com"
      data_requirements:
        user_description: "Extract hot topics from 百度热搜"
        output_format:
          text: "Topic or link text"
        sample_data:
          - text: "热点话题1"
      options:
        max_items: 5
        timeout: 30

    outputs:
      extracted_data: "baidu_data"
      message: "baidu_message"

    timeout: 60

  # Step 3: Summarize both results
  - id: "summarize-results"
    name: "Summarize Results"
    agent_type: "text_agent"
    description: "Summarize data from both sites"

    agent_instruction: |
      Based on the data extracted from example.com and baidu.com, create a brief summary.

      Example.com data: {{example_data}}
      Baidu.com data: {{baidu_data}}

      Please provide:
      1. The title found on example.com
      2. A list of hot topics or main items from baidu.com (if any)
      3. A brief observation about the difference between these two websites

      Format your response in a clear, structured way.

    text:
      response_style: "analytical"
      max_length: 500
      language: "en"

    inputs:
      example_data: "{{example_data}}"
      baidu_data: "{{baidu_data}}"

    outputs:
      answer: "final_summary"

    timeout: 30

  # Step 4: Prepare final output
  - id: "prepare-output"
    name: "Prepare Final Output"
    agent_type: "variable"
    description: "Organize final output"

    operation: "set"
    data:
      example_title: "{{example_data}}"
      baidu_hot_topics: "{{baidu_data}}"
      summary: "{{final_summary}}"
      test_status: "Browser session sharing test completed"

    agent_instruction: "Prepare final output structure"

    inputs:
      example_data: "{{example_data}}"
      baidu_data: "{{baidu_data}}"
      final_summary: "{{final_summary}}"

    outputs:
      example_title: "example_title"
      baidu_hot_topics: "baidu_hot_topics"
      summary: "summary"
      test_status: "final_response"

    timeout: 10
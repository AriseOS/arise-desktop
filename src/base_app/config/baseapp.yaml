agent:
  llm:
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-5
    provider: anthropic
  memory:
    config:
      embedder:
        config:
          api_key: ${OPENAI_API_KEY}
          model: text-embedding-3-small
        provider: openai
      llm:
        config:
          api_key: ${OPENAI_API_KEY}
          model: gpt-4o-mini
        provider: openai
      vector_store:
        config:
          collection_name: mem0_collection
          path: ~/.local/share/baseapp/chroma_db
        provider: chroma
      version: v1.1
    enabled: true
    provider: mem0
  name: BaseApp Agent
  tools:
    browser:
      headless: false
      timeout: 30
    enabled:
    - browser
    - memory
app:
  debug: false
  host: 0.0.0.0
  name: BaseApp
  port: 8000
  version: 1.0.0

# Data storage configuration
data:
  # Root directory for all data files
  root: ~/.local/share/baseapp

  # Database files
  databases:
    sessions: ${data.root}/sessions.db    # Session storage
    kv: ${data.root}/agent_kv.db          # Key-value storage
    storage: ${data.root}/storage.db      # Storage agent database

  # Vector database directory
  chroma_db: ${data.root}/chroma_db

  # Browser related directories
  browser_data: ~/.cache/baseapp/browser_data   # Browser user data
  debug: ${data.root}/debug                     # Debug output

logging:
  backup_count: 5
  file: ${data.root}/logs/baseapp.log
  level: INFO
  max_size: 10MB

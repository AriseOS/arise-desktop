apiVersion: "agentcrafter.io/v1"
kind: "Workflow"

metadata:
  name: "allegro-coffee-collection-workflow"
  description: "Collect all coffee products from first page with title, price and sales"
  version: "1.0.0"
  tags: ["scraper", "allegro", "coffee", "collection"]

inputs:
  max_products:
    type: "integer"
    description: "Maximum products to collect"
    required: false
    default: 50

outputs:
  product_details:
    type: "array"
    description: "Collected product information"
  final_response:
    type: "string"
    description: "Completion message"

config:
  max_execution_time: 1800
  enable_parallel: false
  enable_cache: true

steps:
  - id: "init-vars"
    name: "Initialize variables"
    agent_type: "variable"
    description: "Initialize data collection variables"
    agent_instruction: "Initialize product collection variables"
    inputs:
      operation: "set"
      data:
        all_product_urls: []
        all_product_details: []
    outputs:
      all_product_urls: "all_product_urls"
      all_product_details: "all_product_details"
    timeout: 10

  - id: "extract-product-urls"
    name: "Extract product URLs"
    agent_type: "scraper_agent"
    description: "Navigate to coffee category and extract all product URLs from first page"
    agent_instruction: "Visit Allegro coffee category page and extract all product URLs"
    inputs:
      target_path: "https://allegro.pl/kategoria/produkty-spozywcze-kawa-74030"
      extraction_method: "script"
      dom_scope: "full"
      data_requirements:
        user_description: "Extract all coffee product URLs from the product listing"
        output_format:
          url: "Product URL"
        sample_data:
          - url: "https://allegro.pl/oferta/kawa-ziarnista-1kg-brazylia-santos-swiezo-palona-100-arabica-tommy-cafe-12786896326"
          - url: "https://allegro.pl/oferta/example-product-2"
    outputs:
      extracted_data: "product_urls"
    timeout: 45

  - id: "save-urls"
    name: "Save product URLs"
    agent_type: "variable"
    description: "Save extracted URLs to variable"
    agent_instruction: "Save product URLs to collection variable"
    inputs:
      operation: "set"
      data:
        all_product_urls: "{{product_urls}}"
    outputs:
      all_product_urls: "all_product_urls"
    timeout: 10

  - id: "collect-product-details"
    name: "Collect product details"
    agent_type: "foreach"
    description: "Iterate through all coffee products, extract title, price and sales count for each"
    source: "{{all_product_urls}}"
    item_var: "current_product"
    index_var: "product_index"
    loop_timeout: 900
    steps:
      - id: "scrape-product-details"
        name: "Scrape product details"
        agent_type: "scraper_agent"
        description: "Extract product title, price and sales count"
        agent_instruction: "Visit product page and extract title, price and sales information"
        inputs:
          target_path: "{{current_product.url}}"
          extraction_method: "llm"
          dom_scope: "partial"
          data_requirements:
            user_description: "Extract product title, price and sales count"
            output_format:
              title: "Product title"
              price: "Product price"
              sales_count: "Number of people who bought recently"
            sample_data:
              title: "Kawa ziarnista 1kg BRAZYLIA Santos Świeżo Palona 100% ARABICA Tommy Cafe"
              price: "69,50 zł"
              sales_count: "3 308 osób kupiło ostatnio"
        outputs:
          extracted_data: "product_info"
        timeout: 60

      - id: "append-product"
        name: "Add product to list"
        agent_type: "variable"
        description: "Append product info to collection"
        agent_instruction: "Add product to collection list"
        inputs:
          operation: "append"
          source: "{{all_product_details}}"
          data: "{{product_info}}"
        outputs:
          result: "all_product_details"
        timeout: 10

      - id: "store-product"
        name: "Store product to database"
        agent_type: "storage_agent"
        description: "Persist product information to database"
        agent_instruction: "Store product details to database"
        inputs:
          operation: "store"
          collection: "allegro_coffee_products"
          data: "{{product_info}}"
        outputs:
          message: "store_message"
        timeout: 15

  - id: "prepare-output"
    name: "Prepare final output"
    agent_type: "variable"
    description: "Organize collection results"
    agent_instruction: "Prepare final output with collected products"
    inputs:
      operation: "set"
      data:
        product_details: "{{all_product_details}}"
        final_response: "Successfully collected {{product_index}} coffee products from Allegro"
    outputs:
      product_details: "product_details"
      final_response: "final_response"
    timeout: 10
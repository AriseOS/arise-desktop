# API Proxy Configuration File
# User management and LLM API proxy microservice

# Server Settings
server:
  host: "0.0.0.0"
  port: 8080
  reload: true
  workers: 1

# Database Settings
database:
  # Database type: postgresql or sqlite
  type: "sqlite"  # Use SQLite by default for easier setup

  # PostgreSQL settings
  postgresql:
    host: "localhost"
    port: 5432
    database: "ami_proxy"
    username: "ami_user"
    password: "ami_password"
    pool_size: 10
    max_overflow: 20

  # SQLite settings (for development/testing)
  sqlite:
    path: "~/.ami/database/api_proxy.db"

# JWT Authentication
jwt:
  secret_key: "your-secret-key-change-in-production"
  algorithm: "HS256"
  access_token_expire_minutes: 43200  # 30 days

# Security Settings
security:
  # Encryption key for API keys (base64-encoded Fernet key)
  # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  encryption_key: "your-encryption-key-change-in-production-use-fernet-generate-key"
  bcrypt_rounds: 12

# API Key Settings
api_key:
  prefix: "ami_"
  length: 32

# Cloud Backend Proxy Settings
cloud_backend:
  base_url: "http://localhost:8000"
  timeout_seconds: 300

# LLM Provider Settings (for proxying)
llm:
  # Default provider: anthropic or openai
  default_provider: "anthropic"

  # Anthropic settings
  anthropic:
    api_key: ""  # Set via ANTHROPIC_API_KEY environment variable
    base_url: "https://api.anthropic.com"
    default_model: "claude-sonnet-4-5-20250929"
    max_tokens: 8192

  # OpenAI settings (not supported yet)
  openai:
    api_key: ""  # Set via OPENAI_API_KEY environment variable
    base_url: "https://api.openai.com/v1"
    default_model: "gpt-4"

# User Quota Settings
quota:
  # Trial users
  trial:
    workflow_executions_per_month: 50
    trial_period_days: 30

  # Paid users (future)
  paid:
    workflow_executions_per_month: 1000

# Admin Settings
admin:
  # Admin API key for dashboard access
  # IMPORTANT: Change this in production!
  api_key: "adminadmintest"
  username: "admin"
  email: "admin@ami.com"

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "~/.ami/logs/api-proxy.log"

# CORS Settings
cors:
  enabled: true
  allow_origins:
    - "http://localhost:3000"
    - "http://localhost:1420"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:1420"
  allow_credentials: true
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
    - "*"

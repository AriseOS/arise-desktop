# 分页商品爬取工作流
apiVersion: "agentcrafter.io/v1"
kind: "Workflow"

metadata:
  name: "paginated-products-scraper"
  description: "分页爬取电商网站商品数据，支持多页列表和详情页数据提取"
  version: "1.0.0"
  author: "AgentCrafter"
  tags: ["scraper", "pagination", "e-commerce", "browser-automation"]

# 工作流输入定义
inputs:
  base_url:
    type: "string"
    description: "商品列表页基础URL"
    required: true
    default: "https://allegro.pl/kategoria/kawa-kawa-mielona-74033"

  max_pages:
    type: "integer"
    description: "最多爬取的页数"
    required: false
    default: 3

  products_per_page:
    type: "integer"
    description: "每页最多爬取的商品数"
    required: false
    default: 10

# 工作流输出定义
outputs:
  all_products_data:
    type: "array"
    description: "所有收集的商品数据"

  total_products_count:
    type: "integer"
    description: "总共收集的商品数量"

  summary_report:
    type: "string"
    description: "数据汇总分析报告"

# 全局配置
config:
  max_execution_time: 3600
  enable_parallel: false
  enable_cache: true
  timeout_strategy: "continue_on_error"

# 工作流步骤
steps:
  # ============================================
  # 步骤1: 初始化全局变量
  # ============================================
  - id: "init-global-vars"
    name: "初始化全局变量"
    agent_type: "text_agent"
    description: "初始化分页循环和数据收集所需的变量"

    agent_instruction: |
      初始化以下变量并返回JSON格式：
      {
        "current_page": 1,
        "all_products_data": [],
        "has_next_page": true,
        "total_products_collected": 0
      }

    text:
      response_style: "structured"
      max_length: 200

    inputs:
      question: "初始化分页爬取所需变量"

    outputs:
      current_page: "current_page"
      all_products_data: "all_products_data"
      has_next_page: "has_next_page"
      total_products_collected: "total_products_collected"

    timeout: 10

  # ============================================
  # 步骤2: 打开浏览器会话
  # ============================================
  - id: "init-browser"
    name: "初始化浏览器"
    agent_type: "tool_agent"
    description: "创建浏览器会话用于后续页面访问"

    agent_instruction: |
      使用browser_use工具初始化浏览器会话
      保持会话活跃用于多页面访问

    tools:
      allowed: ["browser_use"]

    inputs:
      task: "initialize_browser"

    outputs:
      browser_ready: "browser_initialized"
      session_id: "browser_session_id"

    timeout: 30
    retry_count: 2

  # ============================================
  # 步骤3: 外层循环 - 遍历所有页面
  # ============================================
  - id: "page-iteration-loop"
    name: "页面遍历循环"
    control_type: "while"
    description: "遍历多个列表页面"

    condition: "{{current_page}} <= {{max_pages}} && {{has_next_page}} == true"
    max_iterations: 20
    loop_timeout: 2400

    then_steps:
      # ----------------------------------------
      # 3.1: 构建当前页URL
      # ----------------------------------------
      - id: "build-page-url"
        name: "构建当前页URL"
        agent_type: "text_agent"
        description: "根据页码构建完整的列表页URL"

        agent_instruction: |
          构建当前页面的URL。
          基础URL: {{base_url}}
          当前页码: {{current_page}}

          如果是第1页，直接返回基础URL。
          如果是其他页，添加分页参数（如 ?p=2 或 &page=2）。

          分析URL结构并返回JSON：
          {
            "current_url": "完整的URL",
            "page_info": "第{{current_page}}页"
          }

        inputs:
          base_url: "{{base_url}}"
          page: "{{current_page}}"

        outputs:
          current_url: "current_page_url"
          page_info: "current_page_info"

        timeout: 10

      # ----------------------------------------
      # 3.2: 打开列表页
      # ----------------------------------------
      - id: "open-list-page"
        name: "打开商品列表页"
        agent_type: "tool_agent"
        description: "导航到当前列表页"

        agent_instruction: |
          使用browser_use导航到URL: {{current_page_url}}
          等待页面完全加载

        tools:
          allowed: ["browser_use"]

        inputs:
          task: "navigate"
          url: "{{current_page_url}}"

        outputs:
          page_loaded: "list_page_loaded"

        timeout: 30
        retry_count: 2

      # ----------------------------------------
      # 3.3: 提取商品URL列表
      # ----------------------------------------
      - id: "extract-product-urls"
        name: "提取商品链接"
        agent_type: "scraper_agent"
        description: "从列表页提取所有商品的详情页链接"

        agent_instruction: |
          分析当前列表页，提取所有商品的详情页链接。
          最多提取 {{products_per_page}} 个商品链接。

          返回商品URL列表和数量。

        inputs:
          mode: "initialize"
          extraction_method: "llm"
          dom_scope: "partial"
          sample_path: "{{current_page_url}}"
          data_requirements:
            user_description: "提取商品列表页中所有商品的详情页链接"
            output_format:
              url: "商品详情页的完整URL"
              title: "商品标题（如果可见）"
            sample_data:
              - url: "https://allegro.pl/oferta/example-product-123"
                title: "示例商品标题"
          max_items: "{{products_per_page}}"

        outputs:
          test_data: "current_page_products"
          total_count: "current_page_product_count"

        timeout: 60
        retry_count: 1

      # ----------------------------------------
      # 3.4: 初始化商品循环变量
      # ----------------------------------------
      - id: "init-product-loop-vars"
        name: "初始化商品循环变量"
        agent_type: "text_agent"
        description: "为内层商品循环准备变量"

        agent_instruction: |
          初始化商品循环变量。
          商品列表: {{current_page_products}}

          返回JSON：
          {
            "product_index": 0,
            "products_to_process": {{current_page_products}},
            "total_products_in_page": {{current_page_product_count}}
          }

        inputs:
          products: "{{current_page_products}}"
          count: "{{current_page_product_count}}"

        outputs:
          product_index: "product_index"
          products_to_process: "products_to_process"
          total_products_in_page: "total_products_in_page"

        timeout: 10

      # ----------------------------------------
      # 3.5: 内层循环 - 遍历当前页商品
      # ----------------------------------------
      - id: "product-iteration-loop"
        name: "商品数据收集循环"
        control_type: "while"
        description: "遍历当前页的所有商品并收集数据"

        condition: "{{product_index}} < {{total_products_in_page}}"
        max_iterations: 50
        loop_timeout: 600

        then_steps:
          # ------------------------------------
          # 3.5.1: 获取当前商品信息
          # ------------------------------------
          - id: "get-current-product"
            name: "获取当前商品"
            agent_type: "text_agent"
            description: "从列表中获取当前索引的商品"

            agent_instruction: |
              从商品列表中获取索引为 {{product_index}} 的商品。
              商品列表: {{products_to_process}}

              返回JSON：
              {
                "current_product_url": "商品URL",
                "current_product_title": "商品标题（如果有）",
                "product_number": {{product_index}} + 1
              }

            inputs:
              products: "{{products_to_process}}"
              index: "{{product_index}}"

            outputs:
              current_product_url: "current_product_url"
              current_product_title: "current_product_title"
              product_number: "current_product_number"

            timeout: 10

          # ------------------------------------
          # 3.5.2: 打开商品详情页
          # ------------------------------------
          - id: "open-product-page"
            name: "打开商品详情页"
            agent_type: "tool_agent"
            description: "导航到商品详情页"

            agent_instruction: |
              导航到商品详情页: {{current_product_url}}
              等待页面加载完成

            tools:
              allowed: ["browser_use"]

            inputs:
              task: "navigate"
              url: "{{current_product_url}}"

            outputs:
              product_page_loaded: "product_page_ready"

            timeout: 30
            retry_count: 1

          # ------------------------------------
          # 3.5.3: 提取商品详细数据
          # ------------------------------------
          - id: "extract-product-details"
            name: "提取商品详情"
            agent_type: "scraper_agent"
            description: "从商品详情页提取完整数据"

            agent_instruction: |
              从当前商品详情页提取以下信息：
              - 标题、价格、评分、卖家
              - 库存状态、描述、图片
              - 其他可用的商品属性

            inputs:
              mode: "execute"
              extraction_method: "llm"
              dom_scope: "partial"
              target_path: "{{current_product_url}}"
              data_requirements:
                user_description: "提取商品详情页的完整信息"
                output_format:
                  title: "商品标题"
                  price: "商品价格（数字）"
                  currency: "货币单位"
                  rating: "评分（如果有）"
                  rating_count: "评价数量"
                  seller: "卖家名称"
                  availability: "库存状态"
                  description: "商品描述（前200字）"
                  image_url: "主图URL"
                  url: "商品页面URL"
                sample_data:
                  - title: "示例商品"
                    price: 29.99
                    currency: "PLN"
                    rating: 4.5
                    seller: "卖家店铺"
              options:
                max_items: 1
                timeout: 30

            outputs:
              extracted_data: "current_product_data"
              metadata: "extraction_metadata"

            timeout: 45
            retry_count: 1

          # ------------------------------------
          # 3.5.4: 添加到总数据集
          # ------------------------------------
          - id: "append-product-data"
            name: "保存商品数据"
            agent_type: "text_agent"
            description: "将提取的数据添加到总集合"

            agent_instruction: |
              将当前商品数据添加到总数据集。

              当前总数据: {{all_products_data}}
              新商品数据: {{current_product_data}}

              将新数据添加到列表，并更新计数。

              返回JSON：
              {
                "updated_all_products": [所有数据],
                "new_total_count": 更新后的总数
              }

            inputs:
              all_data: "{{all_products_data}}"
              new_data: "{{current_product_data}}"
              current_total: "{{total_products_collected}}"

            outputs:
              all_products_data: "all_products_data"
              total_products_collected: "total_products_collected"

            timeout: 15

          # ------------------------------------
          # 3.5.5: 商品索引递增
          # ------------------------------------
          - id: "increment-product-index"
            name: "更新商品索引"
            agent_type: "text_agent"
            description: "移动到下一个商品"

            agent_instruction: |
              将商品索引加1。
              当前索引: {{product_index}}

              返回JSON：
              {
                "product_index": {{product_index}} + 1,
                "remaining_in_page": {{total_products_in_page}} - ({{product_index}} + 1)
              }

            inputs:
              current_index: "{{product_index}}"
              total: "{{total_products_in_page}}"

            outputs:
              product_index: "product_index"
              remaining_products: "remaining_in_page"

            timeout: 5

      # ----------------------------------------
      # 3.6: 检查是否有下一页
      # ----------------------------------------
      - id: "check-next-page"
        name: "检查下一页"
        agent_type: "scraper_agent"
        description: "检查列表页是否有下一页"

        agent_instruction: |
          检查当前页面是否有"下一页"按钮或链接。
          查找以下元素：
          - "Następna" (波兰语)
          - "Next"
          - "下一页"
          - 分页数字按钮

          返回是否存在下一页。

        inputs:
          mode: "execute"
          extraction_method: "llm"
          dom_scope: "partial"
          target_path: "{{current_page_url}}"
          data_requirements:
            user_description: "检查页面是否有下一页链接或按钮"
            output_format:
              has_next: "是否有下一页（true/false）"
              next_page_url: "下一页URL（如果有）"
            sample_data:
              - has_next: true
                next_page_url: "https://example.com?page=2"
          options:
            max_items: 1
            timeout: 20

        outputs:
          extracted_data: "next_page_info"

        timeout: 30

      # ----------------------------------------
      # 3.7: 更新页码和下一页标志
      # ----------------------------------------
      - id: "update-page-vars"
        name: "更新页面变量"
        agent_type: "text_agent"
        description: "准备下一轮页面循环"

        agent_instruction: |
          更新页面循环变量。
          当前页码: {{current_page}}
          下一页信息: {{next_page_info}}

          将页码加1，并提取has_next值。

          返回JSON：
          {
            "current_page": {{current_page}} + 1,
            "has_next_page": 从next_page_info中提取has_next的值,
            "pages_processed": {{current_page}}
          }

        inputs:
          page: "{{current_page}}"
          next_info: "{{next_page_info}}"

        outputs:
          current_page: "current_page"
          has_next_page: "has_next_page"
          pages_processed: "total_pages_processed"

        timeout: 10

  # ============================================
  # 步骤4: 生成数据分析报告
  # ============================================
  - id: "generate-report"
    name: "生成分析报告"
    agent_type: "text_agent"
    description: "基于收集的数据生成详细分析报告"

    agent_instruction: |
      基于收集的所有商品数据生成分析报告。

      数据: {{all_products_data}}
      总数量: {{total_products_collected}}
      处理页数: {{total_pages_processed}}

      生成包含以下内容的中文报告：

      ## 数据收集概况
      - 处理的页面数量
      - 收集的商品总数
      - 数据收集时间

      ## 价格分析
      - 平均价格
      - 价格范围（最低-最高）
      - 价格分布

      ## 评分分析（如有数据）
      - 平均评分
      - 最高评分商品
      - 最低评分商品

      ## 卖家分析
      - 卖家数量
      - 主要卖家列表

      ## TOP 5 推荐商品
      基于综合因素（价格、评分等）推荐5个商品

      ## 数据质量评估
      - 数据完整性
      - 缺失字段统计

    text:
      response_style: "analytical"
      max_length: 3000
      language: "zh"

    inputs:
      all_products: "{{all_products_data}}"
      total_count: "{{total_products_collected}}"
      pages_count: "{{total_pages_processed}}"

    outputs:
      summary_report: "summary_report"
      report_stats: "analysis_statistics"

    timeout: 60
    retry_count: 2

  # ============================================
  # 步骤5: 保存结果（可选）
  # ============================================
  - id: "save-results"
    name: "保存数据和报告"
    agent_type: "code_agent"
    description: "将收集的数据保存到文件"
    condition: "{{total_products_collected}} > 0"

    agent_instruction: |
      将收集的商品数据和分析报告保存到JSON文件。

      创建包含以下结构的JSON文件：
      {
        "metadata": {
          "total_products": 数量,
          "pages_processed": 页数,
          "extraction_time": 时间戳
        },
        "products": 商品数据列表,
        "report": 分析报告
      }

      文件名: products_{{timestamp}}.json

    code:
      allowed_libraries: ["json", "datetime", "pathlib"]
      expected_output_format: "保存成功信息"

    inputs:
      products_data: "{{all_products_data}}"
      report: "{{summary_report}}"
      stats: "{{analysis_statistics}}"

    outputs:
      save_result: "data_save_status"
      file_path: "saved_file_path"

    timeout: 30

  # ============================================
  # 步骤6: 最终输出
  # ============================================
  - id: "final-output"
    name: "整理最终输出"
    agent_type: "text_agent"
    description: "准备工作流的最终输出"

    agent_instruction: |
      整理工作流的最终输出。

      返回JSON格式：
      {
        "all_products_data": {{all_products_data}},
        "total_products_count": {{total_products_collected}},
        "summary_report": "{{summary_report}}"
      }

    inputs:
      products: "{{all_products_data}}"
      count: "{{total_products_collected}}"
      report: "{{summary_report}}"

    outputs:
      all_products_data: "all_products_data"
      total_products_count: "total_products_count"
      summary_report: "summary_report"

    timeout: 10
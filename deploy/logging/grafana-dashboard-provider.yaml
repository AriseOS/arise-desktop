# Grafana Dashboard Provider Configuration
# Auto-loads dashboards from the dashboards folder

apiVersion: 1

providers:
  - name: 'Ami Dashboards'
    orgId: 1
    folder: 'Ami'
    folderUid: 'ami'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards

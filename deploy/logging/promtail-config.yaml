# Promtail Configuration for Ami Cloud Backend
#
# Collects logs from:
# - Cloud Backend application logs
# - System logs (optional)

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Cloud Backend logs (JSON format, collected by file)
  - job_name: cloud_backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: cloud_backend
          service: cloud_backend
          __path__: /logs/cloud_backend/cloud-backend.log
    pipeline_stages:
      # Parse JSON logs
      - json:
          expressions:
            level: level
            service: service
            module: module
            user_id: user_id
            request_id: request_id
            workflow_id: workflow_id
            message: message
      # Add extracted labels
      - labels:
          level:
          service:
          module:
          user_id:
          request_id:
          workflow_id:

  # User uploaded workflow logs (stored by Cloud Backend)
  - job_name: workflow_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: workflow_logs
          source: user_upload
          type: workflow_run
          __path__: /var/log/ami-storage/**/workflow_logs/**/*.json
    pipeline_stages:
      - json:
          expressions:
            user_id: user_id
            workflow_id: workflow_id
            run_id: run_id
            status: 'meta.status'
      - labels:
          user_id:
          workflow_id:
          run_id:

  # System logs (optional)
  # - job_name: system
  #   static_configs:
  #     - targets:
  #         - localhost
  #       labels:
  #         job: system
  #         __path__: /var/log/syslog

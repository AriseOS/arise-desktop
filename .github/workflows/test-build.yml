name: Test Build

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test-macos-build:
    name: Test macOS Build (Apple Silicon)
    runs-on: macos-14  # M1/M2 runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          cd src/app_backend
          python3 -m venv venv-build
          source venv-build/bin/activate
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          deactivate

      - name: Install npm dependencies
        run: |
          cd src/clients/desktop_app
          npm ci

      - name: Build application (no signing)
        run: |
          ./scripts/build.sh --no-sign

      - name: Check build output
        run: |
          ls -lh dist/
          echo "DMG file:"
          ls -lh dist/*.dmg

      - name: Get version from DMG filename
        id: get_version
        run: |
          DMG_FILE=$(ls dist/Ami-*.dmg | head -1)
          VERSION=$(basename "$DMG_FILE" | sed 's/Ami-\(.*\)\.dmg/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "dmg_file=$DMG_FILE" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Rename DMG with platform tag
        run: |
          cd dist
          OLD_NAME=$(basename "${{ steps.get_version.outputs.dmg_file }}")
          NEW_NAME="Ami-${{ steps.get_version.outputs.version }}-macos-arm64.dmg"
          mv "$OLD_NAME" "$NEW_NAME"
          echo "Renamed: $OLD_NAME → $NEW_NAME"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ami-macos-arm64-test
          path: dist/Ami-*-macos-arm64.dmg
          if-no-files-found: error

      - name: Install boto3 for R2 upload
        run: pip3 install boto3

      - name: Upload to Cloudflare R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python3 .github/scripts/upload_to_r2.py \
            --file "dist/Ami-${{ steps.get_version.outputs.version }}-macos-arm64.dmg" \
            --version "${{ steps.get_version.outputs.version }}" \
            --platform macos \
            --arch arm64 \
            --commit-sha "${{ github.sha }}"

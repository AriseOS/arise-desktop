name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '18'

jobs:
  # ============================================================================
  # macOS Apple Silicon (M1/M2/M3)
  # ============================================================================
  build-macos-arm64:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/clients/desktop_app/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src/clients/desktop_app/src-tauri

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Update version in tauri.conf.json
        run: |
          cd src/clients/desktop_app/src-tauri
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"${{ steps.version.outputs.version }}\"/" tauri.conf.json
          rm tauri.conf.json.bak
          echo "Updated version to ${{ steps.version.outputs.version }}"

      - name: Install Python dependencies
        run: |
          cd src/app_backend
          python3 -m venv venv-build
          source venv-build/bin/activate
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          deactivate

      - name: Install npm dependencies
        run: |
          cd src/clients/desktop_app
          npm ci

      - name: Import Code-Signing Certificates
        if: ${{ secrets.MACOS_CERTIFICATE != '' }}
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Build application
        run: |
          if [ -n "${{ secrets.MACOS_CERTIFICATE }}" ]; then
            export CODESIGN_IDENTITY="${{ secrets.MACOS_SIGNING_IDENTITY }}"
            export ENTITLEMENTS_FILE="src/app_backend/entitlements.plist"
            echo "Building with code signing..."
            ./scripts/build.sh
          else
            echo "Building without code signing..."
            ./scripts/build.sh --no-sign
          fi
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'

      - name: Notarize DMG
        if: ${{ secrets.MACOS_CERTIFICATE != '' && secrets.NOTARIZE_APPLE_ID != '' }}
        run: |
          echo "Storing notarization credentials..."
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "${{ secrets.NOTARIZE_APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.NOTARIZE_APP_PWD }}"

          echo "Submitting DMG for notarization..."
          xcrun notarytool submit dist/Ami-${{ steps.version.outputs.version }}.dmg \
            --keychain-profile "notarytool-profile" \
            --wait

          echo "Stapling notarization ticket..."
          xcrun stapler staple dist/Ami-${{ steps.version.outputs.version }}.dmg

          echo "✓ Notarization complete"

      - name: Rename DMG
        run: |
          cd dist
          mv Ami-${{ steps.version.outputs.version }}.dmg Ami-${{ steps.version.outputs.version }}-macos-arm64.dmg
          ls -lh *.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/Ami-*-macos-arm64.dmg
          if-no-files-found: error

      - name: Install boto3 for R2
        run: pip3 install boto3

      - name: Upload to Cloudflare R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          SIGNED="false"
          NOTARIZED="false"

          if [ -n "${{ secrets.MACOS_CERTIFICATE }}" ]; then
            SIGNED="true"
          fi

          if [ -n "${{ secrets.NOTARIZE_APPLE_ID }}" ]; then
            NOTARIZED="true"
          fi

          python3 .github/scripts/upload_to_r2.py \
            --file "dist/Ami-${{ steps.version.outputs.version }}-macos-arm64.dmg" \
            --version "${{ steps.version.outputs.version }}" \
            --platform macos \
            --arch arm64 \
            --commit-sha "${{ github.sha }}" \
            $([ "$SIGNED" = "true" ] && echo "--signed") \
            $([ "$NOTARIZED" = "true" ] && echo "--notarized")

  # ============================================================================
  # macOS Intel (x86_64)
  # ============================================================================
  build-macos-x64:
    name: Build macOS (Intel)
    runs-on: macos-13

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/clients/desktop_app/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src/clients/desktop_app/src-tauri

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Update version in tauri.conf.json
        run: |
          cd src/clients/desktop_app/src-tauri
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"${{ steps.version.outputs.version }}\"/" tauri.conf.json
          rm tauri.conf.json.bak

      - name: Install Python dependencies
        run: |
          cd src/app_backend
          python3 -m venv venv-build
          source venv-build/bin/activate
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          deactivate

      - name: Install npm dependencies
        run: |
          cd src/clients/desktop_app
          npm ci

      - name: Import Code-Signing Certificates
        if: ${{ secrets.MACOS_CERTIFICATE != '' }}
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Build application
        run: |
          if [ -n "${{ secrets.MACOS_CERTIFICATE }}" ]; then
            export CODESIGN_IDENTITY="${{ secrets.MACOS_SIGNING_IDENTITY }}"
            export ENTITLEMENTS_FILE="src/app_backend/entitlements.plist"
            ./scripts/build.sh
          else
            ./scripts/build.sh --no-sign
          fi
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.13'

      - name: Notarize DMG
        if: ${{ secrets.MACOS_CERTIFICATE != '' && secrets.NOTARIZE_APPLE_ID != '' }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "${{ secrets.NOTARIZE_APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.NOTARIZE_APP_PWD }}"

          xcrun notarytool submit dist/Ami-${{ steps.version.outputs.version }}.dmg \
            --keychain-profile "notarytool-profile" \
            --wait

          xcrun stapler staple dist/Ami-${{ steps.version.outputs.version }}.dmg

      - name: Rename DMG
        run: |
          cd dist
          mv Ami-${{ steps.version.outputs.version }}.dmg Ami-${{ steps.version.outputs.version }}-macos-x64.dmg
          ls -lh *.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: dist/Ami-*-macos-x64.dmg
          if-no-files-found: error

      - name: Install boto3 for R2
        run: pip3 install boto3

      - name: Upload to Cloudflare R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          SIGNED="false"
          NOTARIZED="false"

          if [ -n "${{ secrets.MACOS_CERTIFICATE }}" ]; then
            SIGNED="true"
          fi

          if [ -n "${{ secrets.NOTARIZE_APPLE_ID }}" ]; then
            NOTARIZED="true"
          fi

          python3 .github/scripts/upload_to_r2.py \
            --file "dist/Ami-${{ steps.version.outputs.version }}-macos-x64.dmg" \
            --version "${{ steps.version.outputs.version }}" \
            --platform macos \
            --arch x64 \
            --commit-sha "${{ github.sha }}" \
            $([ "$SIGNED" = "true" ] && echo "--signed") \
            $([ "$NOTARIZED" = "true" ] && echo "--notarized")

  # ============================================================================
  # Windows x64
  # ============================================================================
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/clients/desktop_app/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src/clients/desktop_app/src-tauri

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Update version in tauri.conf.json
        shell: bash
        run: |
          cd src/clients/desktop_app/src-tauri
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${{ steps.version.outputs.version }}\"/" tauri.conf.json

      - name: Install npm dependencies
        run: |
          cd src/clients/desktop_app
          npm ci

      - name: Build Windows application
        shell: pwsh
        run: |
          .\scripts\build_portable_windows.ps1

      - name: Rename ZIP
        shell: bash
        run: |
          cd src/clients/desktop_app/portable
          mv AmiPortable.zip Ami-${{ steps.version.outputs.version }}-windows-x64.zip
          ls -lh *.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: src/clients/desktop_app/portable/Ami-*-windows-x64.zip
          if-no-files-found: error

      - name: Install boto3 for R2
        shell: bash
        run: pip install boto3

      - name: Upload to Cloudflare R2
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python .github/scripts/upload_to_r2.py \
            --file "src/clients/desktop_app/portable/Ami-${{ steps.version.outputs.version }}-windows-x64.zip" \
            --version "${{ steps.version.outputs.version }}" \
            --platform windows \
            --arch x64 \
            --commit-sha "${{ github.sha }}"

  # ============================================================================
  # Create GitHub Release (only on tag push)
  # ============================================================================
  create-release:
    name: Create GitHub Release
    needs: [build-macos-arm64, build-macos-x64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Ami v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/macos-arm64/Ami-*-macos-arm64.dmg
            artifacts/macos-x64/Ami-*-macos-x64.dmg
            artifacts/windows-x64/Ami-*-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

apiVersion: "ami.io/v1"
kind: "Workflow"

metadata:
  name: "producthunt-weekly-leaderboard-scraper"
  description: "从 Product Hunt 每周排行榜（Weekly Leaderboard）中抓取热门产品的详细信息，包括产品名称、描述、评分、评论数、关注者数以及团队成员信息"
  version: "1.0.0"
  tags: ["producthunt", "scraper", "weekly-leaderboard"]

inputs:
  max_products:
    type: "integer"
    description: "Maximum number of products to scrape"
    required: false
    default: 20

outputs:
  product_details:
    type: "array"
    description: "Collected product information with team members"
  final_response:
    type: "string"
    description: "Completion message"

config:
  max_execution_time: 3600
  enable_parallel: false
  enable_cache: true

steps:
  - id: "init-vars"
    name: "Initialize variables"
    agent_type: "variable"
    description: "Initialize data collection variables"
    agent_instruction: "Initialize product collection variables"
    inputs:
      operation: "set"
      data:
        all_product_urls: []
        all_product_details: []
    outputs:
      all_product_urls: "all_product_urls"
      all_product_details: "all_product_details"
    timeout: 10

  - id: "extract-weekly-products"
    name: "Extract weekly leaderboard products"
    agent_type: "scraper_agent"
    description: "Navigate to Product Hunt weekly leaderboard and extract all product URLs"
    agent_instruction: "Visit Product Hunt weekly leaderboard page and extract all product URLs from the list"
    inputs:
      target_path: "https://www.producthunt.com/leaderboard/weekly/2025/44"
      interaction_steps:
        - action_type: "scroll"
          parameters:
            down: true
            num_pages: 2.0
        - action_type: "scroll"
          parameters:
            down: true
            num_pages: 2.0
        - action_type: "scroll"
          parameters:
            down: true
            num_pages: 2.0
      extraction_method: "script"
      dom_scope: "full"
      max_items: 50
      data_requirements:
        user_description: "Extract all product URLs from Product Hunt weekly leaderboard"
        output_format:
          url: "Product detail page URL"
        sample_data:
          - url: "https://www.producthunt.com/products/v0"
          - url: "https://www.producthunt.com/products/example-product"
    outputs:
      extracted_data: "product_urls"
    timeout: 60

  - id: "save-product-urls"
    name: "Save product URLs"
    agent_type: "variable"
    description: "Save extracted product URLs to variable"
    agent_instruction: "Save product URLs to collection variable"
    inputs:
      operation: "set"
      data:
        all_product_urls: "{{product_urls}}"
    outputs:
      all_product_urls: "all_product_urls"
    timeout: 10

  - id: "collect-product-details"
    name: "Collect product details"
    agent_type: "foreach"
    description: "Iterate through products and collect detailed information including team members"
    source: "{{all_product_urls}}"
    item_var: "current_product"
    index_var: "product_index"
    max_iterations: 50
    loop_timeout: 1800
    steps:
      - id: "scrape-product-info"
        name: "Scrape product information"
        agent_type: "scraper_agent"
        description: "Extract product details from product page"
        agent_instruction: "Visit Product Hunt product page and extract product name, tagline, description, rating, reviews, and followers"
        inputs:
          target_path: "{{current_product.url}}"
          extraction_method: "script"
          dom_scope: "partial"
          data_requirements:
            user_description: |
              Extract product information from Product Hunt product page. The page has TWO layout patterns:

              PATTERN 1 - Single Product (company and product are the same):
              - Company name (h1 in div[1]) = Product name
              - Company tagline (h2 in div[1]) = Product tagline
              - Company description (span in div[1]/div[3]) = Product description

              PATTERN 2 - Separate Company and Product (e.g., Microsoft Copilot company with Mico product):
              - Company name: h1 in div[1]/div[1]/.../h1
              - Company tagline: h2 in div[1]/div[1]/.../h2 (subtitle below company name)
              - Company description: span in div[1]/div[3]/div/span
              - Product name: h2 in div[2]/.../section[1]/div[1]/div/h2
              - Product tagline: span in div[2]/.../section[1]/div[1]/span
              - Product description: div in div[2]/div/div/div[2]

              Detection rule: If section[1] with h2 exists in div[2] area, it's PATTERN 2; otherwise PATTERN 1.

              Also extract:
              - Rating: span in div[1]/div[1]/.../div[2]/span (format: "5.0")
              - Reviews count: Look for text containing "reviews" near rating
              - Followers count: p tag containing "followers" in div[1]/div[1]/.../div[2]/span/p

              Return empty string if field doesn't exist. Do not generate content.
            output_format:
              company_name: "Company or creator name (h1 in top area)"
              product_name: "Product name (h2 in section[1] if exists, otherwise same as company_name)"
              company_tagline: "Company tagline (h2 subtitle in top area)"
              product_tagline: "Product tagline (span in section[1] if exists, otherwise same as company_tagline)"
              description_of_company: "Company description (span in div[1]/div[3])"
              description_of_product: "Product description (div in div[2] area if exists, otherwise same as company description)"
              rating: "Product rating score"
              reviews_count: "Number of reviews"
              followers_count: "Number of followers"
            sample_data:
              company_name: "The New Microsoft Copilot"
              product_name: "Mico"
              company_tagline: "Your AI Companion"
              product_tagline: "A vibrant new way to talk with Copilot"
              description_of_company: "Meet the new Microsoft Copilot, your AI companion that remembers details (Memory), takes action (Actions), sees your world (Vision), and more. More personal & useful."
              description_of_product: "Mico is a new animated persona for Microsoft Copilot's voice mode. It adds visual expressions like smiles and nods to make conversations feel more natural and adaptive."
              rating: "5.0"
              reviews_count: "281 reviews"
              followers_count: "670 followers"
            xpath_hints:
              company_name: "//*[@id='root-container']/div[3]/div/main/div[1]/div[1]/div[1]/div[1]/div/div[1]/h1"
              product_name: "//*[@id='root-container']/div[3]/div/main/div[2]/div/div/section[1]/div[1]/div/h2"
              company_tagline: "//*[@id='root-container']/div[3]/div/main/div[1]/div[1]/div[1]/div[1]/div/div[2]/h2"
              product_tagline: "//*[@id='root-container']/div[3]/div/main/div[2]/div/div/section[1]/div[1]/span"
              description_of_company: "//*[@id='root-container']/div[3]/div/main/div[1]/div[3]/div/span"
              description_of_product: "//*[@id='root-container']/div[3]/div/main/div[2]/div/div/div[2]"
              rating: "//*[@id='root-container']/div[3]/div/main/div[1]/div[1]/div[1]/div[1]/div/div[2]/span"
              followers_count: "//*[@id='root-container']/div[3]/div/main/div[1]/div[1]/div[1]/div[1]/div/div[2]/span/p"
        outputs:
          extracted_data: "product_info"
        timeout: 60

      - id: "scrape-team-members"
        name: "Scrape team members"
        agent_type: "scraper_agent"
        description: "Extract team member information from team page"
        agent_instruction: "Navigate to Product Hunt product team page and extract all team member names and positions"
        inputs:
          target_path: "{{current_product.url}}/makers"
          extraction_method: "script"
          dom_scope: "full"
          data_requirements:
            user_description: "Extract team member information from Product Hunt team page including member names and positions"
            output_format:
              name: "Team member name"
              position: "Team member position or role"
            sample_data:
              - name: "Richárd Kunkli"
                position: "Mobile @ Vercel"
              - name: "Gary Tokman"
                position: "Mobile @ Vercel"
              - name: "Evil Rabbit"
                position: "Founding Designer at Vercel"
              - name: "Fernando Rojo"
                position: "Head of Mobile at Vercel"
            xpath_hints:
              name: "//*[@id='root-container']/div[3]/div/main/div[3]"
              position: "//*[@id='root-container']/div[3]/div/main/div[3]"
        outputs:
          extracted_data: "team_members"
        timeout: 60

      - id: "merge-product-data"
        name: "Merge product data with team info"
        agent_type: "variable"
        description: "Combine product information with team members"
        agent_instruction: "Merge product details with team member information"
        inputs:
          operation: "set"
          data:
            complete_product:
              url: "{{current_product.url}}"
              company_name: "{{product_info.0.company_name}}"
              product_name: "{{product_info.0.product_name}}"
              company_tagline: "{{product_info.0.company_tagline}}"
              product_tagline: "{{product_info.0.product_tagline}}"
              description_of_company: "{{product_info.0.description_of_company}}"
              description_of_product: "{{product_info.0.description_of_product}}"
              rating: "{{product_info.0.rating}}"
              reviews_count: "{{product_info.0.reviews_count}}"
              followers_count: "{{product_info.0.followers_count}}"
              team_members: "{{team_members}}"
        outputs:
          complete_product: "complete_product"
        timeout: 10

      - id: "append-product"
        name: "Add product to collection"
        agent_type: "variable"
        description: "Append complete product info to collection"
        agent_instruction: "Add product with team info to collection list"
        inputs:
          operation: "append"
          source: "{{all_product_details}}"
          data: "{{complete_product}}"
        outputs:
          result: "all_product_details"
        timeout: 10

      - id: "store-product"
        name: "Store product to database"
        agent_type: "storage_agent"
        description: "Persist product information to database"
        agent_instruction: "Store complete product information including team members to database"
        inputs:
          operation: "store"
          collection: "producthunt_weekly_products"
          data: "{{complete_product}}"
        outputs:
          message: "store_message"
        timeout: 20

  - id: "prepare-output"
    name: "Prepare final output"
    agent_type: "variable"
    description: "Organize collection results"
    agent_instruction: "Prepare final output with collected product details"
    inputs:
      operation: "set"
      data:
        product_details: "{{all_product_details}}"
        final_response: "Successfully collected {{product_index}} products from Product Hunt weekly leaderboard with team information"
    outputs:
      product_details: "product_details"
      final_response: "final_response"
    timeout: 10
apiVersion: "ami.io/v1"
kind: "Workflow"

metadata:
  name: "allegro-coffee-collection-workflow"
  description: "Collect coffee product information from Allegro including product name, price, and sales count"
  version: "1.0.0"
  tags: ["scraper", "allegro", "coffee", "price-collection"]

inputs:
  max_products:
    type: "integer"
    description: "Maximum number of products to collect"
    required: false
    default: 50

outputs:
  product_details:
    type: "array"
    description: "Collected coffee product information"
  final_response:
    type: "string"
    description: "Completion message"

config:
  max_execution_time: 1800
  enable_parallel: false
  enable_cache: true

steps:
  - id: "init-vars"
    name: "Initialize variables"
    agent_type: "variable"
    description: "Initialize data collection variables"
    agent_instruction: "Initialize product collection variables"
    inputs:
      operation: "set"
      data:
        all_product_urls: []
        all_product_details: []
    outputs:
      all_product_urls: "all_product_urls"
      all_product_details: "all_product_details"
    timeout: 10

  - id: "extract-product-urls"
    name: "Extract coffee product URLs"
    agent_type: "scraper_agent"
    description: "Navigate to coffee category and extract all product URLs from first page"
    agent_instruction: "Visit Allegro coffee category page and extract all product URLs"
    inputs:
      target_path: "https://allegro.pl/kategoria/produkty-spozywcze-kawa-74030"
      extraction_method: "script"
      dom_scope: "full"
      max_items: 10
      data_requirements:
        user_description: "Extract all coffee product URLs from the listing page"
        output_format:
          url: "Product detail page URL"
        sample_data:
          - url: "https://allegro.pl/oferta/kawa-ziarnista-1kg-brazylia-santos-swiezo-palona-100-arabica-tommy-cafe-12786896326"
          - url: "https://allegro.pl/oferta/example-product-2"
          - url: "https://allegro.pl/events/clicks?emission_unit_id=571bff70-d855-409a-9345-4159498483d6&emission_id=cefdee88-876f-4ace-9a1b-d65876a7e71c&type=OFFER&ts=1760958164482&redirect=https%3A%2F%2Fallegro.pl%2Foferta%2Fkawa-ziarnista-1kg-brazylia-cerrado-swiezo-palona-arabica-100-singleorigin-9664732492%3Fbi_s%3Dads%26bi_m%3Dproductlisting%253Adesktop%253Acategory%26bi_c%3DNTBiOGI0OTktYzUxNC00MWM4LTgwZmUtODhjYzVkMjQxOTcwAA%26bi_t%3Dape&placement=productlisting:desktop:category&sig=f3409ee77124290ba4e8db88fe52e010"
        xpath_hints:
          url: "//*[@id=\"search-results\"]/div[5]/div[2]/div/div/div/div/div/ul/li[1]/article/div/div[2]/div[1]/div/h2/a"
    outputs:
      extracted_data: "product_urls"
    timeout: 60

  - id: "save-urls"
    name: "Save product URLs"
    agent_type: "variable"
    description: "Save extracted URLs to variable"
    agent_instruction: "Save product URLs to collection variable"
    inputs:
      operation: "set"
      data:
        all_product_urls: "{{product_urls}}"
    outputs:
      all_product_urls: "all_product_urls"
    timeout: 10

  - id: "collect-product-details"
    name: "Collect product details"
    agent_type: "foreach"
    description: "Iterate through all coffee products and extract detailed information"
    source: "{{all_product_urls}}"
    item_var: "current_product"
    index_var: "product_index"
    max_iterations: 50
    loop_timeout: 1200
    steps:
      - id: "scrape-product-info"
        name: "Scrape product information"
        agent_type: "scraper_agent"
        description: "Extract product name, price, and sales count"
        agent_instruction: "Visit product detail page and extract name, price, and sales count"
        inputs:
          target_path: "{{current_product.url}}"
          extraction_method: "script"
          dom_scope: "partial"
          data_requirements:
            user_description: "Extract coffee product details including name, price, and purchase statistics"
            output_format:
              product_name: "Coffee product name"
              product_price: "Product price"
              sales_count: "Number of people who purchased recently"
            sample_data:
              product_name: "Kawa ziarnista 1kg BRAZYLIA Santos Świeżo Palona 100% ARABICA Tommy Cafe"
              product_price: "69,50 zł"
              sales_count: "3 308 osób kupiło ostatnio"
            xpath_hints:
              product_name: "//*[@id=\"showproduct-left-column-wrapper\"]/div/div[1]/div/div/div/div/div/div[1]/div/div/div[1]/div/h1"
              product_price: "//*[@id=\"showproduct-right-column-wrapper\"]/div/div[1]/div/div/div[2]/div/div/div/div/div/section/div[1]/div[1]"
              sales_count: "//*[@id=\"showproduct-left-column-wrapper\"]/div/div[1]/div/div/div/div/div/div[1]/div/div/div[1]/div/div[2]/div/div[1]/div/div[2]"
        outputs:
          extracted_data: "product_info"
        timeout: 60

      - id: "append-product"
        name: "Add product to collection"
        agent_type: "variable"
        description: "Append product information to collection list"
        agent_instruction: "Add product to collection list"
        inputs:
          operation: "append"
          source: "{{all_product_details}}"
          data: "{{product_info}}"
        outputs:
          result: "all_product_details"
        timeout: 10

      - id: "store-product"
        name: "Store product to database"
        agent_type: "storage_agent"
        description: "Persist product information to database"
        agent_instruction: "Store coffee product information to database"
        inputs:
          operation: "store"
          collection: "allegro_coffee_products"
          data: "{{product_info}}"
        outputs:
          message: "store_message"
        timeout: 15

  - id: "prepare-output"
    name: "Prepare final output"
    agent_type: "variable"
    description: "Organize collection results and prepare final response"
    agent_instruction: "Prepare final output with collection summary"
    inputs:
      operation: "set"
      data:
        product_details: "{{all_product_details}}"
        final_response: "Successfully collected {{product_index}} coffee products from Allegro with name, price, and sales count"
    outputs:
      product_details: "product_details"
      final_response: "final_response"
    timeout: 10
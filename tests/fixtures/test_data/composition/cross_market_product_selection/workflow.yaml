apiVersion: "ami.io/v1"
kind: "Workflow"

metadata:
  name: "coffee-market-analysis-workflow"
  description: "Analyze coffee product opportunities by comparing Poland (Allegro) and US (Amazon) markets to identify profitable sourcing opportunities"
  version: "1.0.0"
  tags: ["market-analysis", "coffee", "allegro", "amazon", "comparison"]

inputs:
  max_allegro_products:
    type: "integer"
    description: "Maximum Allegro products to collect"
    required: false
    default: 20
  max_amazon_products:
    type: "integer"
    description: "Maximum Amazon products to collect"
    required: false
    default: 20

outputs:
  allegro_products:
    type: "array"
    description: "Collected Allegro coffee product information"
  amazon_products:
    type: "array"
    description: "Collected Amazon coffee product information"
  final_response:
    type: "string"
    description: "Analysis completion summary"

config:
  max_execution_time: 3600
  enable_parallel: false
  enable_cache: true

steps:
  - id: "init-vars"
    name: "Initialize variables"
    agent_type: "variable"
    description: "Initialize data collection variables for both markets"
    agent_instruction: "Initialize product collection variables"
    inputs:
      operation: "set"
      data:
        all_allegro_product_urls: []
        all_allegro_product_details: []
        all_amazon_product_urls: []
        all_amazon_product_details: []
    outputs:
      all_allegro_product_urls: "all_allegro_product_urls"
      all_allegro_product_details: "all_allegro_product_details"
      all_amazon_product_urls: "all_amazon_product_urls"
      all_amazon_product_details: "all_amazon_product_details"
    timeout: 10

  # Allegro Market Collection
  - id: "extract-allegro-urls"
    name: "Extract Allegro product URLs"
    agent_type: "scraper_agent"
    description: "Navigate to Allegro coffee category and extract all product URLs"
    agent_instruction: "Visit Allegro coffee category page and extract all product URLs"
    inputs:
      target_path: "https://allegro.pl/kategoria/produkty-spozywcze-kawa-74030"
      extraction_method: "script"
      dom_scope: "full"
<<<<<<< Updated upstream
      max_items: 10
      debug_mode: true
      data_requirements:
        user_description: "Extract all Allegro coffee product URLs from the listing page"
=======
      data_requirements:
        user_description: "Extract all Allegro coffee product URLs only from product list"
>>>>>>> Stashed changes
        output_format:
          url: "Product URL"
        sample_data:
          - url: "https://allegro.pl/oferta/kawa-ziarnista-1kg-brazylia-santos-swiezo-palona-100-arabica-tommy-cafe-12786896326"
          - url: "https://allegro.pl/oferta/kawa-ziarnista-arabica-example-123456"
    outputs:
      extracted_data: "allegro_product_urls"
    timeout: 60

  - id: "save-allegro-urls"
    name: "Save Allegro product URLs"
    agent_type: "variable"
    description: "Save extracted Allegro URLs to variable"
    agent_instruction: "Save Allegro product URLs"
    inputs:
      operation: "set"
      data:
        all_allegro_product_urls: "{{allegro_product_urls}}"
    outputs:
      all_allegro_product_urls: "all_allegro_product_urls"
    timeout: 10

  - id: "collect-allegro-details"
    name: "Collect Allegro product details"
    agent_type: "foreach"
    description: "Iterate through Allegro coffee products and extract detailed information"
    source: "{{all_allegro_product_urls}}"
    item_var: "current_allegro_product"
    index_var: "allegro_product_index"
    max_iterations: 20
    loop_timeout: 1200
    steps:
      - id: "scrape-allegro-product"
        name: "Scrape Allegro product information"
        agent_type: "scraper_agent"
        description: "Extract Allegro product details including name, price, and purchase statistics"
        agent_instruction: "Visit Allegro product page and extract product name, price, and purchase statistics"
        inputs:
          extraction_method: "script"
          target_path: "{{current_allegro_product.url}}"
          data_requirements:
            user_description: "Extract Allegro product name, price, and purchase count"
            output_format:
              product_name: "Product name"
              price: "Product price"
              purchase_count: "Number of people who bought recently"
            sample_data:
              product_name: "Kawa ziarnista 1kg BRAZYLIA Santos Świeżo Palona 100% ARABICA Tommy Cafe"
              price: "69,50 zł"
              purchase_count: "3 308 osób kupiło ostatnio"
            xpath_hints:
              product_name: "//*[@id='showproduct-left-column-wrapper']/div/div[1]/div/div/div/div/div/div[1]/div/div/div[1]/div/h1"
              price: "//*[@id='showproduct-right-column-wrapper']/div/div[1]/div/div/div[2]/div/div/div/div/div/section/div[1]/div[1]"
              purchase_count: "//*[@id='showproduct-left-column-wrapper']/div/div[1]/div/div/div/div/div/div[1]/div/div/div[1]/div/div[2]/div/div[1]/div/div[2]"
        outputs:
          extracted_data: "allegro_product_info"
        timeout: 60

      - id: "append-allegro-product"
        name: "Add Allegro product to list"
        agent_type: "variable"
        description: "Append Allegro product info to collection"
        agent_instruction: "Add Allegro product to list"
        inputs:
          operation: "append"
          source: "{{all_allegro_product_details}}"
          data: "{{allegro_product_info}}"
        outputs:
          result: "all_allegro_product_details"
        timeout: 10

      - id: "store-allegro-product"
        name: "Store Allegro product to database"
        agent_type: "storage_agent"
        description: "Persist Allegro product information"
        agent_instruction: "Store Allegro product to database"
        inputs:
          operation: "store"
          collection: "allegro_coffee_products"
          data: "{{allegro_product_info}}"
        outputs:
          message: "allegro_store_message"
        timeout: 15

  # Amazon Market Collection
  - id: "extract-amazon-urls"
    name: "Extract Amazon product URLs"
    agent_type: "scraper_agent"
    description: "Navigate to Amazon coffee category and extract all product URLs"
    agent_instruction: "Visit Amazon coffee category page and extract all product URLs"
    inputs:
      target_path: "https://www.amazon.com/s?i=grocery&rh=n%3A23783759011%2Cp_72%3A4-&s=featured-rank"
      extraction_method: "script"
      dom_scope: "full"
<<<<<<< Updated upstream
      max_items: 10
      debug_mode: true
      data_requirements:
        user_description: "Extract all Amazon coffee product URLs from the listing page"
=======
      data_requirements:
        user_description: "Extract all Amazon coffee product URLs"
>>>>>>> Stashed changes
        output_format:
          url: "Product URL"
        sample_data:
          - url: "https://www.amazon.com/Lavazza-Dolcevita-Classico-Full-bodied-Intensity/dp/B00PQKRVFG"
          - url: "https://www.amazon.com/Coffee-Product-Example/dp/B00EXAMPLE"
    outputs:
      extracted_data: "amazon_product_urls"
    timeout: 60

  - id: "save-amazon-urls"
    name: "Save Amazon product URLs"
    agent_type: "variable"
    description: "Save extracted Amazon URLs to variable"
    agent_instruction: "Save Amazon product URLs"
    inputs:
      operation: "set"
      data:
        all_amazon_product_urls: "{{amazon_product_urls}}"
    outputs:
      all_amazon_product_urls: "all_amazon_product_urls"
    timeout: 10

  - id: "collect-amazon-details"
    name: "Collect Amazon product details"
    agent_type: "foreach"
    description: "Iterate through Amazon coffee products and extract detailed information"
    source: "{{all_amazon_product_urls}}"
    item_var: "current_amazon_product"
    index_var: "amazon_product_index"
    max_iterations: 20
    loop_timeout: 1200
    steps:
      - id: "scrape-amazon-product"
        name: "Scrape Amazon product information"
        agent_type: "scraper_agent"
        description: "Extract Amazon product details including name and customer ratings"
        agent_instruction: "Visit Amazon product page and extract product name and customer ratings"
        inputs:
          extraction_method: "script"
          target_path: "{{current_amazon_product.url}}"
          data_requirements:
            user_description: "Extract Amazon product name and customer ratings"
            output_format:
              product_name: "Product name"
              ratings_count: "Number of customer ratings"
            sample_data:
              product_name: "Lavazza House Blend Perfetto Ground Coffee 12oz Bag, Medium Roast, Full-bodied, Intensity 3/5, 100% Arabica, Ideal for Drip Brewers, (Pack of 1) - Package May Vary"
              ratings_count: "8,168 ratings"
            xpath_hints:
              product_name: "//*[@id='productTitle']"
              ratings_count: "//*[@id='acrCustomerReviewText']"
        outputs:
          extracted_data: "amazon_product_info"
        timeout: 60

      - id: "append-amazon-product"
        name: "Add Amazon product to list"
        agent_type: "variable"
        description: "Append Amazon product info to collection"
        agent_instruction: "Add Amazon product to list"
        inputs:
          operation: "append"
          source: "{{all_amazon_product_details}}"
          data: "{{amazon_product_info}}"
        outputs:
          result: "all_amazon_product_details"
        timeout: 10

      - id: "store-amazon-product"
        name: "Store Amazon product to database"
        agent_type: "storage_agent"
        description: "Persist Amazon product information"
        agent_instruction: "Store Amazon product to database"
        inputs:
          operation: "store"
          collection: "amazon_coffee_products"
          data: "{{amazon_product_info}}"
        outputs:
          message: "amazon_store_message"
        timeout: 15

  - id: "prepare-output"
    name: "Prepare final output"
    agent_type: "variable"
    description: "Organize collection results and prepare analysis summary"
    agent_instruction: "Prepare final output with market comparison data"
    inputs:
      operation: "set"
      data:
        allegro_products: "{{all_allegro_product_details}}"
        amazon_products: "{{all_amazon_product_details}}"
        final_response: "Successfully collected {{allegro_product_index}} Allegro products and {{amazon_product_index}} Amazon products for market analysis"
    outputs:
      allegro_products: "allegro_products"
      amazon_products: "amazon_products"
      final_response: "final_response"
    timeout: 10
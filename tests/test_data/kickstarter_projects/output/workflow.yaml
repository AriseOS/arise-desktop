apiVersion: "agentcrafter.io/v1"
kind: "Workflow"

metadata:
  name: "kickstarter-technology-projects-collection"
  description: "Collect latest technology projects from Kickstarter with title, funding, backers, and creator info"
  version: "1.0.0"
  tags: ["kickstarter", "technology", "projects", "scraper"]

inputs:
  max_projects:
    type: "integer"
    description: "Maximum number of projects to collect"
    required: false
    default: 20

outputs:
  all_project_details:
    type: "array"
    description: "Collected project details with funding and creator information"
  final_response:
    type: "string"
    description: "Completion message"

config:
  max_execution_time: 3600
  enable_parallel: false
  enable_cache: true

steps:
  - id: "init-vars"
    name: "Initialize variables"
    agent_type: "variable"
    description: "Initialize data collection variables"
    agent_instruction: "Initialize project collection variables"
    inputs:
      operation: "set"
      data:
        all_project_urls: []
        all_project_details: []
    outputs:
      all_project_urls: "all_project_urls"
      all_project_details: "all_project_details"
    timeout: 10

  - id: "navigate-homepage"
    name: "Navigate to Kickstarter homepage"
    agent_type: "browser_agent"
    description: "Navigate to Kickstarter homepage"
    agent_instruction: "Navigate to Kickstarter homepage"
    inputs:
      target_url: "https://www.kickstarter.com/"
    outputs:
      result: "homepage_nav"
    timeout: 30

  - id: "navigate-search-page"
    name: "Navigate to advanced search page"
    agent_type: "browser_agent"
    description: "Navigate to Kickstarter advanced search page"
    agent_instruction: "Navigate to advanced search page"
    inputs:
      target_url: "https://www.kickstarter.com/discover/advanced?ref=nav_search&term=1"
    outputs:
      result: "search_nav"
    timeout: 30

  - id: "navigate-technology-category"
    name: "Navigate to Technology category"
    agent_type: "browser_agent"
    description: "Navigate to Technology category with filters applied"
    agent_instruction: "Navigate to Technology category page"
    inputs:
      target_url: "https://www.kickstarter.com/discover/advanced?category_id=16&sort=magic&seed=2936830&page=1"
    outputs:
      result: "category_nav"
    timeout: 30

  - id: "navigate-newest-sort"
    name: "Navigate to newest sort"
    agent_type: "browser_agent"
    description: "Apply newest sort filter to view latest technology projects"
    agent_instruction: "Navigate to newest sort page"
    inputs:
      target_url: "https://www.kickstarter.com/discover/advanced?category_id=16&sort=newest&seed=2936830&page=1"
    outputs:
      result: "newest_nav"
    timeout: 30

  - id: "navigate-staff-picks"
    name: "Navigate to staff picks filter"
    agent_type: "browser_agent"
    description: "Apply Projects We Love staff pick filter"
    agent_instruction: "Navigate to staff picks filtered page"
    inputs:
      target_url: "https://www.kickstarter.com/discover/advanced?category_id=16&staff_picks=1&sort=newest&seed=2936830&page=1"
    outputs:
      result: "staff_picks_nav"
    timeout: 30

  - id: "create-page-list"
    name: "Create page number list"
    agent_type: "variable"
    description: "Create a list of page numbers to iterate through"
    agent_instruction: "Create list of page numbers from 1 to 9"
    inputs:
      operation: "set"
      data:
        page_numbers: [3,8, 9]
    outputs:
      page_numbers: "page_numbers"
    timeout: 10

  - id: "collect-urls-from-pages"
    name: "Collect project URLs from all pages"
    agent_type: "foreach"
    description: "Iterate through pages and collect project URLs"
    source: "{{page_numbers}}"
    item_var: "page_num"
    index_var: "page_index"
    max_iterations: 9
    loop_timeout: 600
    steps:
      - id: "navigate-to-page"
        name: "Navigate to page"
        agent_type: "browser_agent"
        description: "Navigate to specific page number"
        agent_instruction: "Navigate to page {{page_num}} of search results"
        inputs:
          target_url: "https://www.kickstarter.com/discover/advanced?category_id=16&woe_id=0&staff_picks=1&sort=newest&seed=2936830&page={{page_num}}"
        outputs:
          result: "page_nav"
        timeout: 30

      - id: "extract-page-urls"
        name: "Extract project URLs from current page"
        agent_type: "scraper_agent"
        description: "Extract all project URLs from current Kickstarter search results page"
        agent_instruction: "Extract all technology project URLs from current page"
        inputs:
          extraction_method: "script"
          dom_scope: "full"
          data_requirements:
            user_description: "Extract project URLs from Kickstarter technology category search results on current page, only product in list don't include any other links not by product in list "
            output_format:
              url: "Project detail page URL"
            sample_data:
              - url: "https://www.kickstarter.com/projects/xlaserlab/xlaserlab-uv-engraver"
            xpath_hints:
              url: "//div[contains(@class, 'js-react-proj-card')]//a[contains(@href, '/projects/')]/@href"
        outputs:
          extracted_data: "page_project_urls"
        timeout: 60

      - id: "append-urls-to-collection"
        name: "Add URLs to global collection"
        agent_type: "variable"
        description: "Append current page URLs to all_project_urls"
        agent_instruction: "Append page URLs to global URL collection"
        inputs:
          operation: "append"
          source: "{{all_project_urls}}"
          data: "{{page_project_urls}}"
        outputs:
          result: "all_project_urls"
        timeout: 10

  - id: "collect-project-details"
    name: "Collect project details"
    agent_type: "foreach"
    description: "Iterate through projects and collect detailed information"
    source: "{{all_project_urls}}"
    item_var: "current_project"
    index_var: "project_index"
    max_iterations:  100
    loop_timeout: 1800
    steps:
      - id: "navigate-project-detail"
        name: "Navigate to project detail page"
        agent_type: "browser_agent"
        description: "Navigate to project detail page"
        agent_instruction: "Navigate to project detail page"
        inputs:
          target_url: "{{current_project.url}}"
        outputs:
          result: "detail_nav"
        timeout: 45

      - id: "extract-project-funding"
        name: "Extract project funding details"
        agent_type: "scraper_agent"
        description: "Extract project funding details from Kickstarter project page"
        agent_instruction: "Extract project title, pledge amount, number of backers, and timeline from current Kickstarter project page"
        inputs:
          extraction_method: "script"
          dom_scope: "full"
          data_requirements:
            user_description: "Extract project funding details including title, pledge amount, backers count, and timeline from Kickstarter project page"
            output_format:
              project_title: "Project title"
              funding_amount: "Total pledged amount with currency"
              backers_count: "Number of backers"
              timeline: "Days remaining or project timeline"
            sample_data:
              project_title: "Xlaserlab E3: The One for All Ultrafast UV Laser Engraver"
              funding_amount: "S$ 896,458 pledged of S$ 129,836 goal"
              backers_count: "125 backers"
              timeline: "56 days to go"
            xpath_hints:
              project_title: "//*[@id='react-project-header']/div/div[1]/div[2]/div/div[2]/div/h1"
              funding_amount: "//*[@id='react-project-header']/div/div[1]/div[1]/div[2]/div[2]/div[1]"
              backers_count: "//*[@id='react-project-header']/div/div[1]/div[1]/div[2]/div[2]/div[2]"
              timeline: "//*[@id='react-project-header']/div/div[1]/div[1]/div[2]/div[2]/div[3]/div/div"
        outputs:
          extracted_data: "project_funding"
        timeout: 60

      - id: "extract-creator-info"
        name: "Extract creator information"
        agent_type: "scraper_agent"
        description: "Extract creator information from Kickstarter Creator tab"
        agent_instruction: "Extract creator name, description, social media links, and location from Kickstarter Creator tab"
        inputs:
          target_path: "{{current_project.url}}/creator"
          extraction_method: "script"
          dom_scope: "full"
          data_requirements:
            user_description: "Extract creator information from Kickstarter Creator tab. The creator name is in an <h3> tag within the creator profile section (NOT the 'About the creator' heading). Social media links include official website, Facebook, Twitter (X), Instagram, YouTube - extract ALL available social links from the creator's profile area."
            output_format:
              creator_name: "Creator name or company name (e.g., 'Tobenone', 'XLaserlab' - from h3 tag in profile section)"
              creator_description: "Creator description or bio text"
              social_media_links: "All social media links and website URLs (official website, Facebook, Twitter/X, Instagram, YouTube, etc.)"
              creator_location: "Creator location (city, state/country)"
            sample_data:
              creator_name: "Tobenone"
              creator_description: "Tobenone is dedicated to creating innovative technology products"
              social_media_links: "tobenone.com/, facebook.com/profile.php?id=100078818767944, @Tobenone1, /tobenoneofficial, youtube.com/@tobenone"
              creator_location: "Wan Chai, Hong Kong"
            xpath_hints:
              creator_name: "//*[@id='react-creator-tab']/div/div/div[1]/div[1]/div/a/h3"
              creator_description: "//*[@id='react-creator-tab']/div/div/div[1]/div[3]"
              social_media_links_container: "//*[@id='react-creator-tab']/div/div/div[1]/div[5]"
              social_media_link_example: "//*[@id='react-creator-tab']/div/div/div[1]/div[5]/a[1]"
              creator_location: "//*[@id='react-creator-tab']/div/div/div[1]/div[2]"
        outputs:
          extracted_data: "creator_info"
        timeout: 60

      - id: "merge-project-data"
        name: "Merge project and creator data"
        agent_type: "variable"
        description: "Merge funding and creator information"
        agent_instruction: "Merge project funding and creator information into one object"
        inputs:
          operation: "set"
          data:
            merged_project:
              project_url: "{{current_project.url}}"
              project_title: "{{project_funding.0.project_title}}"
              funding_amount: "{{project_funding.0.funding_amount}}"
              backers_count: "{{project_funding.0.backers_count}}"
              timeline: "{{project_funding.0.timeline}}"
              creator_name: "{{creator_info.0.creator_name}}"
              creator_description: "{{creator_info.0.creator_description}}"
              social_media_links: "{{creator_info.0.social_media_links}}"
              creator_location: "{{creator_info.0.creator_location}}"
        outputs:
          merged_project: "merged_project"
        timeout: 10

      - id: "append-project"
        name: "Add project to collection"
        agent_type: "variable"
        description: "Append merged project data to collection"
        agent_instruction: "Add merged project to global collection"
        inputs:
          operation: "append"
          source: "{{all_project_details}}"
          data: "{{merged_project}}"
        outputs:
          result: "all_project_details"
        timeout: 10

      - id: "store-project"
        name: "Store project to database"
        agent_type: "storage_agent"
        description: "Persist project information to database"
        agent_instruction: "Store project details to database"
        inputs:
          operation: "store"
          collection: "kickstarter_projects"
          data: "{{merged_project}}"
        outputs:
          message: "store_message"
        timeout: 15

  - id: "prepare-output"
    name: "Prepare final output"
    agent_type: "variable"
    description: "Organize collection results"
    agent_instruction: "Prepare final output with collected projects"
    inputs:
      operation: "set"
      data:
        all_project_details: "{{all_project_details}}"
        final_response: "Successfully collected details for {{project_index}} Kickstarter technology projects"
    outputs:
      all_project_details: "all_project_details"
      final_response: "final_response"
    timeout: 10
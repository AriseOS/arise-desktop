<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentCrafter Extension</title>
  <style>
    body {
      width: 350px;
      min-height: 400px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 600;
    }

    .header p {
      margin: 5px 0 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      color: #333;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 600;
      color: #667eea;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #48bb78;
      color: white;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #38a169;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(72, 187, 120, 0.3);
    }

    .btn-danger {
      background: #f56565;
      color: white;
    }

    .btn-danger:hover:not(:disabled) {
      background: #e53e3e;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(245, 101, 101, 0.3);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      margin-bottom: 12px;
    }

    .status-info {
      background: #bee3f8;
      color: #2c5282;
    }

    .status-success {
      background: #c6f6d5;
      color: #22543d;
    }

    .status-error {
      background: #fed7d7;
      color: #742a2a;
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .input-group input[type="password"] {
      font-family: 'Courier New', monospace;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      opacity: 0.8;
    }

    .hidden {
      display: none;
    }

    .user-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      background: #f7fafc;
      border-radius: 6px;
    }

    .user-info .username {
      font-weight: 600;
      color: #667eea;
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 AgentCrafter</h1>
    <p>Workflow Automation Extension</p>
  </div>

  <div id="status-message"></div>

  <!-- Login Page -->
  <div id="login-page" class="hidden">
    <div class="card">
      <h3>登录</h3>
      <form id="login-form">
        <div class="input-group">
          <label>用户名</label>
          <input type="text" id="username" required placeholder="请输入用户名">
        </div>
        <div class="input-group">
          <label>密码</label>
          <input type="password" id="password" required placeholder="请输入密码">
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">
          登录
        </button>
      </form>
    </div>
    <div class="footer">
      <p>AgentCrafter v1.0.0</p>
    </div>
  </div>

  <!-- Main Page (after login) -->
  <div id="main-page" class="hidden">
    <div class="card" style="padding: 8px 12px;">
      <div class="user-info">
        <span>👤 <span class="username" id="display-username"></span></span>
        <button class="btn btn-danger" id="logout-btn" style="width: auto; padding: 6px 12px; margin: 0; font-size: 12px;">
          退出登录
        </button>
      </div>
    </div>

    <div class="card">
      <h3>快速操作</h3>
      <button id="capture-page" class="btn btn-primary">
        📸 捕获当前页面
      </button>
      <button id="run-workflow" class="btn btn-secondary">
        ▶️ 运行工作流
      </button>
      <button id="open-dashboard" class="btn btn-primary">
        🏠 打开控制台
      </button>
    </div>

    <div class="card">
      <h3>页面信息</h3>
      <div class="input-group">
        <label>当前 URL:</label>
        <input type="text" id="current-url" readonly>
      </div>
      <div class="input-group">
        <label>页面标题:</label>
        <input type="text" id="page-title" readonly>
      </div>
    </div>

    <div class="footer">
      <p>AgentCrafter v1.0.0</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

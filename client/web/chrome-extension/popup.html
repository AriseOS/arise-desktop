<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentCrafter Extension</title>
  <style>
    body {
      width: 350px;
      min-height: 400px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 600;
      color: #1c1c1e;
    }

    .header p {
      margin: 5px 0 0;
      font-size: 14px;
      color: #8e8e93;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      color: #333;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 600;
      color: #667eea;
    }

    /* iOS Settings style */
    .settings-section {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .settings-section-title {
      font-size: 13px;
      font-weight: 400;
      color: #6d6d72;
      text-transform: uppercase;
      margin: 20px 0 8px 12px;
      letter-spacing: 0.5px;
    }

    .settings-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.08);
      cursor: pointer;
      transition: background 0.2s;
      color: #333;
    }

    .settings-item:hover {
      background: rgba(102, 126, 234, 0.05);
    }

    .settings-item:last-child {
      border-bottom: none;
    }

    .settings-item-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .settings-item-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .settings-item-icon svg {
      width: 20px;
      height: 20px;
    }

    .settings-item-text {
      display: flex;
      flex-direction: column;
    }

    .settings-item-title {
      font-size: 15px;
      font-weight: 400;
      color: #1c1c1e;
    }

    .settings-item-subtitle {
      font-size: 13px;
      color: #8e8e93;
      margin-top: 2px;
    }

    .settings-item-arrow {
      color: #c7c7cc;
      font-size: 14px;
    }

    /* App header card */
    .app-header {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .app-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .app-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .app-name {
      font-size: 16px;
      font-weight: 600;
      color: #1c1c1e;
    }

    .app-description {
      font-size: 12px;
      color: #8e8e93;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #48bb78;
      color: white;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #38a169;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(72, 187, 120, 0.3);
    }

    .btn-danger {
      background: #f56565;
      color: white;
    }

    .btn-danger:hover:not(:disabled) {
      background: #e53e3e;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(245, 101, 101, 0.3);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      margin-bottom: 12px;
    }

    .status-info {
      background: #bee3f8;
      color: #2c5282;
    }

    .status-success {
      background: #c6f6d5;
      color: #22543d;
    }

    .status-error {
      background: #fed7d7;
      color: #742a2a;
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .input-group input[type="password"] {
      font-family: 'Courier New', monospace;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #8e8e93;
    }

    .hidden {
      display: none;
    }

    .user-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      background: #f7fafc;
      border-radius: 6px;
    }

    .user-info .username {
      font-weight: 600;
      color: #667eea;
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="status-message"></div>

  <!-- Login Page -->
  <div id="login-page" class="hidden">
    <div class="header">
      <h1>🤖 AgentCrafter</h1>
      <p>Workflow Automation Extension</p>
    </div>
    <div class="card">
      <h3>登录</h3>
      <form id="login-form">
        <div class="input-group">
          <label>用户名</label>
          <input type="text" id="username" required placeholder="请输入用户名">
        </div>
        <div class="input-group">
          <label>密码</label>
          <input type="password" id="password" required placeholder="请输入密码">
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">
          登录
        </button>
      </form>
    </div>
    <div class="footer">
      <p>AgentCrafter v1.0.0</p>
    </div>
  </div>

  <!-- Main Page (after login) -->
  <div id="main-page" class="hidden">
    <!-- App Header -->
    <div class="app-header">
      <div class="app-icon">🤖</div>
      <div class="app-info">
        <div class="app-name">AgentCrafter</div>
        <div class="app-description">Workflow Automation Extension</div>
      </div>
    </div>

    <!-- Workflow Section -->
    <div class="settings-section-title">Workflow</div>
    <div class="settings-section">
      <div class="settings-item" id="menu-record">
        <div class="settings-item-left">
          <div class="settings-item-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <circle cx="12" cy="12" r="3" fill="#667eea"></circle>
            </svg>
          </div>
          <div class="settings-item-text">
            <div class="settings-item-title">录制</div>
          </div>
        </div>
        <div class="settings-item-arrow">›</div>
      </div>
      <div class="settings-item" id="menu-chat">
        <div class="settings-item-left">
          <div class="settings-item-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
          </div>
          <div class="settings-item-text">
            <div class="settings-item-title">对话</div>
          </div>
        </div>
        <div class="settings-item-arrow">›</div>
      </div>
      <div class="settings-item" id="menu-my">
        <div class="settings-item-left">
          <div class="settings-item-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 11l3 3L22 4"></path>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
            </svg>
          </div>
          <div class="settings-item-text">
            <div class="settings-item-title">我的</div>
          </div>
        </div>
        <div class="settings-item-arrow">›</div>
      </div>
    </div>

    <!-- Other Section -->
    <div class="settings-section-title">其他</div>
    <div class="settings-section">
      <div class="settings-item" id="menu-account">
        <div class="settings-item-left">
          <div class="settings-item-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <div class="settings-item-text">
            <div class="settings-item-title">账户</div>
          </div>
        </div>
        <div class="settings-item-arrow">›</div>
      </div>
      <div class="settings-item" id="menu-about">
        <div class="settings-item-left">
          <div class="settings-item-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
          </div>
          <div class="settings-item-text">
            <div class="settings-item-title">关于</div>
          </div>
        </div>
        <div class="settings-item-arrow">›</div>
      </div>
      <div class="settings-item" id="menu-logout">
        <div class="settings-item-left">
          <div class="settings-item-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </div>
          <div class="settings-item-text">
            <div class="settings-item-title">退出登录</div>
          </div>
        </div>
        <div class="settings-item-arrow">›</div>
      </div>
    </div>

    <div class="footer">
      <p>AgentCrafter v1.0.0</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

# 用户问答工作流 - 基于Provider的3步式架构
apiVersion: "agentcrafter.io/v1"
kind: "Workflow"

metadata:
  name: "user-qa-workflow"
  description: "智能用户问答工作流，支持意图识别和条件分支执行"
  version: "1.0.0"
  author: "AgentCrafter"
  tags: ["user-qa", "intent-analysis", "conditional"]

# 工作流输入定义
inputs:
  user_input:
    type: "string"
    description: "用户输入"
    required: true
  user_id:
    type: "string" 
    description: "用户ID"
    required: false
    default: "anonymous"

# 工作流输出定义
outputs:
  final_response:
    type: "string"
    description: "最终响应"

# 全局配置
config:
  max_execution_time: 600
  enable_parallel: false
  enable_cache: true
  timeout_strategy: "fail_fast"

# 工作流步骤
steps:
  # 步骤1: 意图分析
  - id: "intent-analysis"
    name: "用户意图分析"
    agent_type: "text_agent"
    description: "分析用户输入，确定需要的处理方式"
    
    agent_instruction: |
      分析用户输入的意图，判断是否需要：
      1. tool - 工具调用（如搜索、计算、获取信息等）
      2. code - 代码分析（如编程问题、算法、数据分析等）
      3. chat - 简单对话（如闲聊、基础问答等）
      
      只返回: tool, code, 或 chat 中的一个
    
    
    # Text Agent 配置
    text:
      response_style: "concise"
      max_length: 50
      language: "zh"
    
    # 输入配置
    inputs:
      question: "请分析用户意图并分类"
      context_data:
        user_input: "{{user_input}}"
        user_id: "{{user_id}}"
    
    # 输出配置
    outputs:
      answer: "intent_type"
    
    # 执行控制
    timeout: 30
    retry_count: 2
    
    # 验证规则
    validation:
      output_format: "regex"
      pattern: "^(tool|code|chat)$"
      error_message: "意图分析结果必须是 tool, code, 或 chat"

  # 步骤2: 智能分支路由（基于意图类型的if/else控制流）
  - id: "intent-routing"
    name: "意图分支路由"
    agent_type: "if"
    description: "根据意图类型选择合适的处理分支"
    
    condition: "{{intent_type}} == 'tool'"
    inputs: {}
    outputs:
      branch_executed: "selected_branch"
    
    # 工具调用分支
    then:
      - id: "tool-execution"
        name: "工具执行"
        agent_type: "tool_agent"
        description: "执行工具调用操作"
        
        agent_instruction: "根据用户需求选择合适的工具并执行操作"
        
        inputs:
          task_description: "{{user_input}}"
          context_data:
            user_id: "{{user_id}}"
            intent: "{{intent_type}}"
        
        outputs:
          result: "tool_result"
          tool_used: "used_tool"
          confidence: "tool_confidence"
        
        timeout: 120
        retry_count: 1
    
    # 非工具分支（代码或对话）
    else:
      - id: "code-or-chat-routing"
        name: "代码或对话分支"
        agent_type: "if"
        description: "进一步区分代码分析和普通对话"
        
        condition: "{{intent_type}} == 'code'"
        inputs: {}
        outputs:
          sub_branch_executed: "final_branch"
        
        # 代码分析分支
        then:
          - id: "code-analysis"
            name: "代码分析"
            agent_type: "code_agent"
            description: "执行代码相关处理"
            
            agent_instruction: "分析、生成或执行代码来解决用户问题"
            
            inputs:
              task_description: "{{user_input}}"
              input_data:
                user_id: "{{user_id}}"
                intent: "{{intent_type}}"
            
            outputs:
              result: "code_result"
              code_generated: "generated_code"
              execution_info: "code_execution_info"
            
            timeout: 180
            retry_count: 1
        
        # 普通对话分支
        else:
          - id: "chat-response"
            name: "对话响应"
            agent_type: "text_agent"
            description: "处理普通对话请求"
            
            agent_instruction: "基于用户输入提供友好、准确的对话回复"
            
            inputs:
              question: "{{user_input}}"
              context_data:
                user_id: "{{user_id}}"
                intent: "{{intent_type}}"
            
            outputs:
              answer: "chat_result"
            
            timeout: 60
            retry_count: 1

  # 步骤3: 最终响应生成
  - id: "final-response"
    name: "生成最终响应"
    agent_type: "text_agent"
    description: "基于所有可用信息生成用户友好的最终回答"
    
    agent_instruction: |
      基于用户输入和前面步骤的执行结果，生成一个完整、准确、友好的回答。
      
      要求：
      1. 如果有工具执行结果，要整合工具返回的信息
      2. 如果有代码分析结果，要解释代码逻辑和执行结果
      3. 回答要自然流畅，不要显得机械化
      4. 根据用户问题的复杂程度调整回答详细程度
    
    # 始终执行，无条件限制
    text:
      response_style: "professional"
      max_length: 1000
      language: "zh"
    
    inputs:
      question: "{{user_input}}"
      context_data:
        user_id: "{{user_id}}"
        intent_type: "{{intent_type}}"
        selected_branch: "{{selected_branch}}"
        tool_result: "{{tool_result}}"
        used_tool: "{{used_tool}}"
        tool_confidence: "{{tool_confidence}}"
        code_result: "{{code_result}}"
        generated_code: "{{generated_code}}"
        code_execution_info: "{{code_execution_info}}"
        chat_result: "{{chat_result}}"
    
    outputs:
      answer: "final_response"
      word_count: "response_length"
    
    timeout: 60
    retry_count: 2

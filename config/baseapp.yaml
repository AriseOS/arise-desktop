agent:
  llm:
    api_key: ${OPENAI_API_KEY}
    model: gpt-4o
    provider: openai
  memory:
    config:
      llm:
        model: gpt-4o-mini
        provider: openai
      vector_store:
        path: ./data/chroma_db
        provider: chroma
    enabled: true
    provider: mem0
  name: BaseApp Agent
  tools:
    browser:
      headless: true
      timeout: 30
    enabled:
    - browser
    - memory
app:
  debug: false
  host: 0.0.0.0
  name: BaseApp
  port: 8000
  version: 1.0.0
database:
  type: sqlite
  url: ./data/baseapp.db
logging:
  backup_count: 5
  file: ./logs/baseapp.log
  level: INFO
  max_size: 10MB

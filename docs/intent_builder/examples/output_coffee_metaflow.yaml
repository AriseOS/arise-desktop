version: "1.0"
task_description: "用户希望收集热门的第一页的咖啡的商品的相关信息"

nodes:
  # 节点 1: 导航到 Allegro 首页
  - id: node_1
    intent_id: intent_001
    intent_name: "NavigateToAllegro"
    intent_description: "导航到 Allegro 电商网站首页"
    operations:
      - type: navigate
        timestamp: 1757730777260
        url: "https://allegro.pl/"
        page_title: "Navigated Page"

  # 节点 2: 进入咖啡分类页面
  - id: node_2
    intent_id: intent_002
    intent_name: "EnterCoffeeCategory"
    intent_description: "通过菜单导航进入咖啡产品分类页面"
    operations:
      - type: click
        timestamp: 1757730778353
        url: "https://allegro.pl/"
        page_title: "Allegro - atrakcyjne ceny - Strona Główna"
        element:
          xpath: "//div[2]/div[1]/div/div/div[4]/header/div[2]/div/div[1]/button/i"
          tagName: "I"
          className: "mjyo_6x meqh_en msa3_z4 mhd5_0m i150e i1kn6 mpof_vs mupj_mm mp7g_oh im1ut ipmse m0t1_f9 mp4t_4"
          textContent: ""

      - type: click
        timestamp: 1757730780902
        url: "https://allegro.pl/"
        page_title: "Allegro - atrakcyjne ceny - Strona Główna"
        element:
          xpath: "//div[2]/div[1]/div/div/div[4]/header/div[2]/div/div[1]/div/div/div/div[4]/div/div/div/div/div/div/div/div[1]/div/div/div/div/div[1]/div/div/ul/li/ul/li[1]/a"
          tagName: "A"
          className: "mgn2_14 mp0t_0a mgmw_wo mqu1_21 mli8_k4 mqen_m6 l1o8h mj9z_5r l5s4b"
          textContent: "Kawy"
          href: "https://allegro.pl/kategoria/produkty-spozywcze-kawa-74030"

      - type: navigate
        timestamp: 1757730782138
        url: "https://allegro.pl/kategoria/produkty-spozywcze-kawa-74030"
        page_title: "Kawa - Allegro"

  # 节点 2.5: 提取产品列表
  - id: node_2_5
    intent_id: intent_002_5
    intent_name: "ExtractProductList"
    intent_description: "从咖啡分类页面提取第一页所有产品的链接"
    operations:
      - type: extract
        target: "product_urls"
        element:
          xpath: "//*[@id=\"search-results\"]/div[5]/div[2]/div/div/div/div/div/ul/li//article//h2/a"
          tagName: "A"
        value: []  # Array of product URLs
    outputs:
      product_urls: "product_urls"

  # 节点 3: 循环 - 收集第一页所有咖啡产品信息
  - id: node_3
    type: loop
    description: "遍历咖啡分类页面第一页的所有产品，逐个访问产品详情页并收集产品信息到数据库"
    source: "{{product_urls}}"
    item_var: "current_product"
    children:
      - id: node_3_1
        intent_id: intent_003
        intent_name: "CollectProductInfo"
        intent_description: "访问产品详情页，提取并存储产品的标题、价格、销量信息"
        inputs:
          product_url: "{{current_product.href}}"
        operations:
          # 导航到详情页
          - type: navigate
            timestamp: 1757730785298
            url: "{{current_product.href}}"
            page_title: "Product Detail Page"

          # 提取标题
          - type: extract
            target: "title"
            element:
              xpath: "//*[@id=\"showproduct-left-column-wrapper\"]/div/div[1]/div/div/div/div/div/div[1]/div/div/div[1]/div/h1"
              tagName: "H1"
              className: "mp4t_0 mryx_0 mj7a_4 mvrt_8 mp0t_ji m9qz_yo munh_0 mqu1_1j mgmw_wo mgn2_21"
              textContent: "Kawa ziarnista 1kg BRAZYLIA Santos Świeżo Palona 100% ARABICA Tommy Cafe"
            value: "Kawa ziarnista 1kg BRAZYLIA Santos Świeżo Palona 100% ARABICA Tommy Cafe"

          # 提取价格
          - type: extract
            target: "price"
            element:
              xpath: "//*[@id=\"showproduct-right-column-wrapper\"]/div/div[1]/div/div/div[2]/div/div/div/div/div/section/div[1]/div[1]"
              tagName: "DIV"
              className: "_7030e_qVLm-"
              textContent: "cena 69,50 złAllegro Smart! to darmowe dostawy i zwroty: Kurierem, do Automatów paczkowych i Punktów"
            value: "69,50 zł"  # 用户只选择了价格部分

          # 提取销量
          - type: extract
            target: "sales_count"
            element:
              xpath: "//*[@id=\"showproduct-left-column-wrapper\"]/div/div[1]/div/div/div/div/div/div[1]/div/div/div[1]/div/div[2]/div/div[1]/div/div[2]"
              tagName: "DIV"
              className: "mgmw_3z mp7g_oh mryx_8 mryx_0_s"
              textContent: "3 308 osób kupiło ostatnio"
            value: "3 308 osób kupiło ostatnio"

          # 存储所有收集的数据
          - type: store
            params:
              collection: "daily_products"
              fields: ["title", "price", "sales_count"]

        outputs:
          product_info: "product_info"
